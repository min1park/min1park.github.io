<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Lemonade Stand · 레모네이드 사장님</title>
<style>
  :root{
    --bg:#FDF8EE; --panel:#FFFFFF; --ink:#0A0A0A; --sub:#666666;
    --line:#E8E0D2; --gold:#D4A843; --green:#2C7A4D; --green2:#1E5B38;
    --red:#D34234; --blue:#1F6FEB; --cream:#FBF3DD; --lemon:#F2C94C;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--bg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;color:var(--ink);}
  body{display:flex;align-items:center;justify-content:center;padding:10px;-webkit-tap-highlight-color:transparent;touch-action:none;}
  .app{width:min(100%,440px);height:min(100vh,840px);display:flex;flex-direction:column;gap:7px;}
  .top{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:10px 12px;box-shadow:0 8px 24px rgba(10,10,10,.08)}
  .brand{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
  .brand h1{font-size:16px;letter-spacing:-.04em;font-weight:950;line-height:1.05}
  .brand .tag{font-size:10px;color:var(--sub);font-weight:900;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  .stat{background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:6px 3px;text-align:center;min-width:0}
  .stat .label{font-size:9px;color:var(--sub);font-weight:850;white-space:nowrap}
  .stat .value{font-size:15px;font-weight:950;letter-spacing:-.03em;font-variant-numeric:tabular-nums;margin-top:1px}
  .stat.cash .value{color:var(--green)}
  .stat.lv .value{color:var(--gold);font-size:13px}
  .stat.day .value{color:var(--blue)}
  .stat.stock .value{color:var(--ink)}

  .stage{position:relative;flex:1;min-height:0;border:1px solid var(--ink);border-radius:18px;overflow:hidden;box-shadow:0 12px 32px rgba(10,10,10,.14);touch-action:none;user-select:none}
  canvas{display:block;width:100%;height:100%;}

  .actionbar{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .act-btn{appearance:none;border:1px solid var(--ink);background:var(--panel);border-radius:13px;padding:11px 6px;font-size:13.5px;font-weight:950;color:var(--ink);cursor:pointer;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.1}
  .act-btn .sub{font-size:10px;font-weight:800;color:var(--sub)}
  .act-btn:active{background:var(--ink);color:#fff}
  .act-btn:active .sub{color:#ddd}
  .act-btn.make{border-color:var(--green);color:var(--green2)}
  .act-btn.make:active{background:var(--green);color:#fff}

  .hint{font-size:11px;line-height:1.4;color:var(--sub);text-align:center;font-weight:700;padding:0 6px;min-height:15px}
  .footer{text-align:center;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);font-weight:850}

  .overlay{position:fixed;inset:0;background:rgba(10,10,10,.80);display:none;align-items:center;justify-content:center;padding:16px;z-index:30}
  .overlay.show{display:flex}
  .card{width:min(100%,360px);max-height:94vh;overflow-y:auto;background:var(--panel);border-radius:20px;border:2px solid var(--gold);padding:20px 18px;text-align:center;box-shadow:0 18px 44px rgba(0,0,0,.32)}
  .eyebrow{font-size:11px;font-weight:950;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
  .card h2{font-size:23px;letter-spacing:-.05em;line-height:1.1;margin-bottom:10px}
  .card p{font-size:13.5px;line-height:1.55;color:var(--sub);font-weight:700;margin-bottom:13px}
  .card p strong{color:var(--ink);font-weight:950}
  .btn-main{appearance:none;border:0;border-radius:13px;background:var(--ink);color:#fff;padding:13px 16px;width:100%;font-weight:950;font-size:15px;cursor:pointer;touch-action:manipulation}
  .btn-main:disabled{opacity:.4}
  .btn-ghost{appearance:none;border:1px solid var(--line);background:transparent;border-radius:12px;padding:10px;width:100%;font-weight:900;font-size:12.5px;color:var(--sub);cursor:pointer;margin-top:7px}

  .diff-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
  .diff-btn{padding:11px 4px;background:var(--panel);border:1px solid var(--line);border-radius:11px;font-size:12px;font-weight:900;color:var(--sub);cursor:pointer;line-height:1.2}
  .diff-btn small{display:block;font-size:9.5px;font-weight:700;margin-top:2px}
  .diff-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  .menu-list{text-align:left;background:var(--cream);border-radius:12px;padding:10px 12px;margin-bottom:12px}
  .menu-list .mi{display:flex;justify-content:space-between;font-size:13.5px;font-weight:850;padding:3px 0}
  .menu-list .mi .pr{font-variant-numeric:tabular-nums}

  .change-info{background:var(--cream);border-radius:12px;padding:11px;margin-bottom:10px;font-size:13.5px;font-weight:800;line-height:1.55;text-align:left}
  .change-info .ln{display:flex;justify-content:space-between}
  .change-info .tot{border-top:1px dashed var(--line);margin-top:5px;padding-top:5px;font-size:15px}
  .change-info .paid{text-align:center;margin-top:8px;font-size:14px}
  .change-info .big{font-size:19px;font-weight:950;color:var(--blue)}
  .tray{display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap;min-height:40px;background:#F2F4F8;border-radius:10px;padding:8px;margin-bottom:8px}
  .tray .chip{font-size:12.5px;font-weight:900;background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 9px}
  .tray .empty{color:var(--sub);font-weight:700;font-size:12px}
  .money-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
  .money-btn{appearance:none;border:1px solid var(--ink);border-radius:11px;padding:11px 2px;font-size:12.5px;font-weight:950;cursor:pointer;background:var(--panel);color:var(--ink);touch-action:manipulation}
  .money-btn:active{background:var(--ink);color:#fff}
  .money-btn.coin{background:#FBF3DD}
  .money-btn.bill{background:#E8F0DC}
  .change-total{font-size:15px;font-weight:950;margin-bottom:10px}
  .change-total .ok{color:var(--green)} .change-total .over{color:var(--red)}

  .ledger-q{text-align:left;background:var(--cream);border-radius:12px;padding:12px;margin-bottom:10px}
  .ledger-q .qline{font-size:13.5px;font-weight:800;margin-bottom:7px;line-height:1.4}
  .ledger-q .formula{font-size:12.5px;color:var(--sub);font-weight:700;line-height:1.7}
  .ledger-q .formula strong{color:var(--ink)}
  .ledger-input{width:100%;font-size:22px;font-weight:950;text-align:center;font-variant-numeric:tabular-nums;background:#F2F4F8;border:2px solid var(--line);border-radius:10px;padding:9px;color:var(--ink);min-height:54px;display:flex;align-items:center;justify-content:center}
  .ledger-input.correct{background:#D8F0E2;border-color:var(--green)}
  .ledger-input.wrong{background:#F8DEDA;border-color:var(--red)}
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
  .key{appearance:none;border:1px solid var(--line);background:var(--panel);border-radius:11px;padding:13px 0;font-size:19px;font-weight:950;color:var(--ink);cursor:pointer;touch-action:manipulation}
  .key:active{background:var(--ink);color:#fff}
  .key.action{background:var(--blue);color:#fff;border-color:var(--blue)}
  .key.del{background:#F2F4F8;color:var(--sub)}
  .feedback{font-size:13px;font-weight:850;min-height:18px;margin-top:8px}
  .feedback.ok{color:var(--green)} .feedback.no{color:var(--red)}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <section class="top">
    <div class="brand">
      <h1 id="shopName">🛣️ 길바닥 가게</h1>
      <div class="tag">Game · No. 19</div>
    </div>
    <div class="stats">
      <div class="stat day"><div class="label">날</div><div class="value" id="dayEl">1</div></div>
      <div class="stat cash"><div class="label">내 돈</div><div class="value" id="cashEl">5,000</div></div>
      <div class="stat stock"><div class="label">재고🥤</div><div class="value" id="stockEl">5</div></div>
      <div class="stat lv"><div class="label">가게</div><div class="value" id="lvEl">길바닥</div></div>
    </div>
  </section>

  <main class="stage" id="stage">
    <canvas id="game"></canvas>
  </main>

  <div class="actionbar">
    <button class="act-btn make" id="makeBtn">🍋 만들기<span class="sub">5개 / <span id="batchCost">3,500</span>원</span></button>
    <button class="act-btn" id="serveBtn">🛎️ 손님 받기<span class="sub">맨 앞 손님 주문</span></button>
  </div>
  <div class="hint" id="hintBar">손님이 오면 "손님 받기"로 주문을 받고 거스름돈을 만들어 주세요</div>
  <div class="footer">— Min1 Park · 2026 —</div>
</div>

<div class="overlay" id="overlay"><div class="card" id="card"></div></div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const canvas=$('game'), ctx=canvas.getContext('2d'), stage=$('stage');
  const dayEl=$('dayEl'), cashEl=$('cashEl'), stockEl=$('stockEl'), lvEl=$('lvEl'), shopName=$('shopName');
  const makeBtn=$('makeBtn'), serveBtn=$('serveBtn'), batchCost=$('batchCost'), hintBar=$('hintBar');
  const overlay=$('overlay'), card=$('card');

  if(!ctx.roundRect){ CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath();return this;}; }

  const W=420, H=560;

  // ===== Menu (fixed prices) =====
  const MENU = [
    { name:'레모네이드', icon:'🍋', price:1500 },
    { name:'오렌지주스', icon:'🧃', price:2000 },
    { name:'쿠키',       icon:'🍪', price:1000 },
    { name:'컵케이크',   icon:'🧁', price:2500 },
    { name:'프레첼',     icon:'🥨', price:1800 },
  ];

  // ===== Shop levels (volume + theme; prices come from MENU) =====
  const LEVELS = [
    { name:'길바닥',   icon:'🛣️', batch:5,  cost:3500, sky:['#CFEAF6','#E9F4DA'], ground:'#C8B68C', need:0 },
    { name:'매대',     icon:'🪧', batch:8,  cost:5200, sky:['#CFEAF6','#E9F4DA'], ground:'#BFa874', need:20000 },
    { name:'푸드트럭', icon:'🚚', batch:12, cost:7200, sky:['#FBE3C7','#F4E4C2'], ground:'#A88D5E', need:50000 },
    { name:'작은 가게',icon:'🏪', batch:16, cost:8800, sky:['#E5DCF5','#EFE7DA'], ground:'#9C835A', need:100000 },
    { name:'큰 가게',  icon:'🏬', batch:20, cost:10000,sky:['#DCE9F7','#E8EEDC'], ground:'#8E7B58', need:180000 },
    { name:'럭셔리',   icon:'✨', batch:24, cost:11000,sky:['#1B2A4A','#3A2C5A'], ground:'#5A4A6A', need:300000 },
  ];

  const DIFFS = {
    easy:   { label:'쉬움',   grade:'1~2학년', types:[1,1], qty:[1,2] },
    medium: { label:'보통',   grade:'3~4학년', types:[1,2], qty:[1,2] },
    hard:   { label:'어려움', grade:'5~6학년', types:[2,3], qty:[1,3] },
  };

  // ===== State =====
  let state='ready';
  let level=0, day=1, cash=5000, stock=5;
  let difficulty='easy';
  let customers=[], fx=[];
  let dayStart=0, lastTs=0, lastSpawn=0, spawnGap=2000, raf=null;
  let revenueTrue=0, costTrue=0, leftToday=0, batchesToday=0, custToday=0;
  let soldByMenu=[0,0,0,0,0];
  const DAY_SECONDS=40;

  let change=null;
  const MONEY=[ {v:5000,label:'5,000',cls:'bill'},{v:1000,label:'1,000',cls:'bill'},{v:500,label:'500',cls:'coin'},
                {v:100,label:'100',cls:'coin'},{v:50,label:'50',cls:'coin'},{v:10,label:'10',cls:'coin'} ];
  let ledger=null;

  function L(){ return LEVELS[level]; }
  function fmt(n){ return n.toLocaleString('ko-KR'); }
  function now(){ return performance.now(); }
  function rnd(a,b){ return a+Math.random()*(b-a); }
  function ri(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }

  // ===== Order generation =====
  function makeOrder(){
    const d=DIFFS[difficulty];
    const nTypes = ri(d.types[0], d.types[1]);
    const idxs=[0,1,2,3,4];
    // shuffle
    for(let i=idxs.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [idxs[i],idxs[j]]=[idxs[j],idxs[i]]; }
    const chosen = idxs.slice(0, nTypes).sort((a,b)=>a-b);
    return chosen.map(mi => ({ mi, qty: ri(d.qty[0], d.qty[1]) }));
  }
  function orderTotal(order){ return order.reduce((s,o)=>s + o.qty*MENU[o.mi].price, 0); }
  function orderCount(order){ return order.reduce((s,o)=>s + o.qty, 0); }

  // ===== Customer =====
  function makeCustomer(){
    const order=makeOrder();
    const patience=rnd(9000,14000);
    const palette=['#E07A5F','#81B29A','#6A8CC7','#C9A227','#B5838D','#6D6875','#457B9D','#E8A0BF'];
    return { order, patience, born:now(), color:palette[(Math.random()*palette.length)|0],
             x:W/2, slot:0, done:false, leaving:false, leaveAt:0, doneAt:0, bob:Math.random()*7 };
  }
  function spawnGapForLevel(){ return Math.max(2400, 4400 - level*250 + rnd(-400,400)); }

  // ===== Overlay =====
  function openOverlay(html){ card.innerHTML=html; overlay.classList.add('show'); }
  function closeOverlay(){ overlay.classList.remove('show'); }

  // ===== Flow =====
  function showStart(){
    state='ready'; updateHUD();
    const menuHtml = MENU.map(m=>`<div class="mi"><span>${m.icon} ${m.name}</span><span class="pr">${fmt(m.price)}원</span></div>`).join('');
    const diffHtml = Object.entries(DIFFS).map(([k,d])=>
      `<button class="diff-btn ${k===difficulty?'active':''}" data-d="${k}">${d.label}<small>${d.grade}</small></button>`).join('');
    openOverlay(`
      <div class="eyebrow">Ready</div>
      <h2>🍋 레모네이드 사장님</h2>
      <p>손님 주문을 받아 <strong>거스름돈</strong>을 만들고,<br>하루가 끝나면 <strong>매출·비용·이익을 직접 계산</strong>해요.<br>돈을 모으면 가게가 <strong>업그레이드</strong>!</p>
      <div class="menu-list">${menuHtml}</div>
      <p style="margin-bottom:7px;font-weight:850;color:var(--ink)">난이도를 골라요</p>
      <div class="diff-row">${diffHtml}</div>
      <button class="btn-main" id="startBtn">장사 시작</button>
    `);
    card.querySelectorAll('.diff-btn').forEach(b=>b.onclick=()=>{
      difficulty=b.dataset.d;
      card.querySelectorAll('.diff-btn').forEach(x=>x.classList.toggle('active',x.dataset.d===difficulty));
    });
    $('startBtn').onclick=startDay;
  }

  function startDay(){
    closeOverlay(); state='playing';
    customers=[]; fx=[];
    revenueTrue=0; costTrue=0; leftToday=0; batchesToday=0; custToday=0;
    soldByMenu=[0,0,0,0,0];
    dayStart=now(); lastTs=now(); lastSpawn=0; spawnGap=spawnGapForLevel();
    if(!raf) raf=requestAnimationFrame(loop);
    setHint('손님 주문을 받아 거스름돈을 만들어 주세요');
    updateHUD();
  }

  // ===== Serve → change =====
  function serveFront(){
    if(state!=='playing') return;
    const c=customers.find(x=>!x.leaving && !x.done);
    if(!c){ setHint('손님이 없어요!', true); return; }
    const need=orderCount(c.order);
    if(stock<need){ setHint(`재고가 부족해요! ${need}개가 필요해요. "만들기"를 누르세요 🍋`, true); return; }
    const total=orderTotal(c.order);
    const candidates=[5000,10000,20000,30000,50000,100000];
    let paid=candidates.find(b=>b>total) || (Math.ceil(total/10000)*10000+10000);
    state='changing';
    change={ due: paid-total, tray:[], paid, cust:c, total, need, startedAt:now() };
    renderChange();
  }

  function renderChange(){
    const sum=change.tray.reduce((s,v)=>s+v,0);
    const c=change.cust;
    const itemsHtml = c.order.map(o=>{
      const m=MENU[o.mi];
      return `<div class="ln"><span>${m.icon} ${m.name} ${o.qty}개 × ${fmt(m.price)}원</span><span>${fmt(o.qty*m.price)}원</span></div>`;
    }).join('');
    const trayHtml = change.tray.length
      ? change.tray.map((v,i)=>`<span class="chip" data-ti="${i}">${fmt(v)}</span>`).join('')
      : `<span class="empty">동전·지폐를 눌러 거스름돈을 담아요</span>`;
    const moneyHtml = MONEY.map((m,i)=>`<button class="money-btn ${m.cls}" data-i="${i}">${m.label}원</button>`).join('');
    const totalCls = sum===change.due?'ok':sum>change.due?'over':'';
    openOverlay(`
      <div class="eyebrow">주문 계산 · 거스름돈</div>
      <h2>🛎️ 주문</h2>
      <div class="change-info">
        ${itemsHtml}
        <div class="ln tot"><span>합계</span><span>${fmt(change.total)}원</span></div>
        <div class="paid">손님이 <span class="big">${fmt(change.paid)}원</span>을 냈어요.<br>거슬러 줄 돈은?</div>
      </div>
      <div class="tray" id="tray">${trayHtml}</div>
      <div class="change-total">담은 돈: <span class="${totalCls}">${fmt(sum)}원</span></div>
      <div class="money-grid">${moneyHtml}</div>
      <button class="btn-main" id="giveBtn">거스름돈 주기</button>
      <button class="btn-ghost" id="clearBtn">다시 담기</button>
      <div class="feedback" id="chFeedback"></div>
    `);
    card.querySelectorAll('.money-btn').forEach(b=>b.onclick=()=>{ change.tray.push(MONEY[+b.dataset.i].v); renderChange(); });
    card.querySelectorAll('.tray .chip').forEach(ch=>ch.onclick=()=>{ change.tray.splice(+ch.dataset.ti,1); renderChange(); });
    $('giveBtn').onclick=submitChange;
    $('clearBtn').onclick=()=>{ change.tray=[]; renderChange(); };
  }

  function submitChange(){
    const sum=change.tray.reduce((s,v)=>s+v,0);
    const fb=$('chFeedback');
    if(sum===change.due){
      const c=change.cust;
      cash+=change.total; revenueTrue+=change.total; stock-=change.need;
      c.order.forEach(o=>{ soldByMenu[o.mi]+=o.qty; });
      c.done=true; c.doneAt=now(); custToday++;
      fx.push({type:'text',x:c.x,y:H-180,text:'정확해요! ✓',color:'#2C7A4D',life:40,vy:-.7});
      const frozen=now()-change.startedAt;
      dayStart+=frozen;
      for(const o of customers){ if(!o.done&&!o.leaving) o.born+=frozen; }
      closeOverlay(); change=null; state='playing'; lastTs=now(); updateHUD();
    } else if(sum>change.due){
      fb.className='feedback no'; fb.textContent=`너무 많아요! ${fmt(sum-change.due)}원 더 담았어요.`;
    } else {
      fb.className='feedback no'; fb.textContent=`${fmt(change.due-sum)}원이 모자라요.`;
    }
  }

  // ===== Make =====
  function makeBatch(){
    if(state!=='playing') return;
    const c=L();
    if(cash<c.cost){ setHint('돈이 부족해요! 손님을 받아 돈을 버세요.', true); return; }
    cash-=c.cost; costTrue+=c.cost; stock+=c.batch; batchesToday++;
    fx.push({type:'text',x:W/2,y:H-150,text:'+'+c.batch+'개 🍋',color:'#2C7A4D',life:44,vy:-.7});
    if(navigator.vibrate) navigator.vibrate(12);
    updateHUD();
  }

  // ===== End day → ledger =====
  function endDay(){ state='ledger'; ledger={ step:0, input:'' }; renderLedger(); }

  function renderLedger(){
    const lv=L();
    const revenue = soldByMenu.reduce((s,q,i)=>s + q*MENU[i].price, 0);
    // revenue breakdown rows (only menus actually sold)
    const rows = MENU.map((m,i)=> soldByMenu[i]>0
      ? `${m.icon} ${soldByMenu[i]}개 × ${fmt(m.price)}원 = ${fmt(soldByMenu[i]*m.price)}원` : null)
      .filter(Boolean).join('<br>');
    const costFormula = batchesToday>0
      ? `재료 만든 횟수 × 한 번 재료비<br><strong>${batchesToday}번 × ${fmt(lv.cost)}원</strong>`
      : `오늘은 재료를 만들지 않았어요`;
    const steps=[
      { title:'오늘 매출(번 돈)은?', formula:`판 음식값을 모두 더하면?<br><strong>${rows||'판매 없음'}</strong>`, answer:revenue },
      { title:'오늘 비용(재료비)은?', formula:costFormula, answer:costTrue },
      { title:'오늘 이익은?', formula:`이익 = 매출 − 비용<br><strong>${fmt(revenue)}원 − ${fmt(costTrue)}원</strong>`, answer:revenue-costTrue },
    ];
    ledger._steps=steps;
    const s=steps[ledger.step];
    openOverlay(`
      <div class="eyebrow">${day}일차 마감 · ${ledger.step+1}/3</div>
      <h2>📒 장부 정리</h2>
      <div class="ledger-q"><div class="qline">${s.title}</div><div class="formula">${s.formula}</div></div>
      <div class="ledger-input" id="ledInput">${ledger.input?fmt(+ledger.input):'_'}</div>
      <div class="numpad">
        ${[7,8,9,4,5,6,1,2,3].map(n=>`<button class="key" data-k="${n}">${n}</button>`).join('')}
        <button class="key del" data-k="del">⌫</button>
        <button class="key" data-k="0">0</button>
        <button class="key action" data-k="ok">확인</button>
      </div>
      <div class="feedback" id="ledFeedback"></div>
    `);
    card.querySelectorAll('.key').forEach(b=>b.onclick=()=>ledgerKey(b.dataset.k));
  }
  function ledgerKey(k){
    if(k==='del') ledger.input=ledger.input.slice(0,-1);
    else if(k==='ok') return ledgerSubmit();
    else if(ledger.input.length<9) ledger.input+=k;
    $('ledInput').textContent=ledger.input?fmt(+ledger.input):'_';
    $('ledInput').className='ledger-input'; $('ledFeedback').textContent='';
  }
  function ledgerSubmit(){
    if(ledger.input==='') return;
    const s=ledger._steps[ledger.step], val=parseInt(ledger.input,10);
    const inp=$('ledInput'), fb=$('ledFeedback');
    if(val===s.answer){
      inp.className='ledger-input correct'; fb.className='feedback ok'; fb.textContent='정답이에요! 👍';
      setTimeout(()=>{ ledger.step++; if(ledger.step>=3) finishLedger(); else { ledger.input=''; renderLedger(); } }, 800);
    } else {
      inp.className='ledger-input wrong'; fb.className='feedback no';
      fb.textContent=`맞는 값은 ${fmt(s.answer)}원이에요. 다시 적어볼까요?`; ledger.input='';
    }
  }
  function finishLedger(){
    const revenue=soldByMenu.reduce((s,q,i)=>s+q*MENU[i].price,0);
    const profit=revenue-costTrue;
    state='result';
    const nextLv=level<LEVELS.length-1?LEVELS[level+1]:null;
    const canUp=nextLv&&cash>=nextLv.need;
    openOverlay(`
      <div class="eyebrow">${day}일차 완료</div>
      <h2>📊 오늘의 성적</h2>
      <div class="ledger-q" style="text-align:center">
        <div class="qline">손님 <strong>${custToday}명</strong>${leftToday>0?` · 😡 떠난 손님 ${leftToday}명`:''}</div>
        <div class="formula" style="font-size:13px;color:var(--ink)">매출 ${fmt(revenue)}원 − 비용 ${fmt(costTrue)}원 = <strong style="color:${profit>=0?'var(--green)':'var(--red)'}">이익 ${profit>=0?'':'−'}${fmt(Math.abs(profit))}원</strong></div>
        <div class="formula" style="margin-top:6px;font-weight:850;color:var(--ink)">현재 내 돈 ${fmt(cash)}원</div>
      </div>
      ${canUp
        ? `<button class="btn-main" id="upBtn" style="background:var(--gold)">⭐ ${nextLv.icon} ${nextLv.name}(으)로 업그레이드!</button><button class="btn-ghost" id="contBtn">다음 날 계속</button>`
        : (nextLv
            ? `<p style="font-size:12px;color:var(--sub);font-weight:800;margin-bottom:8px">${nextLv.icon} ${nextLv.name}까지 ${fmt(nextLv.need-cash)}원 더!</p><button class="btn-main" id="contBtn">다음 날 ▶</button>`
            : `<p style="font-size:12px;color:var(--gold);font-weight:850;margin-bottom:8px">🏆 최고 등급 럭셔리 가게!</p><button class="btn-main" id="contBtn">다음 날 ▶</button>`)}
    `);
    if(canUp) $('upBtn').onclick=doUpgrade;
    $('contBtn').onclick=()=>{ day++; startDay(); };
  }
  function doUpgrade(){
    level++; state='upgrade'; const lv=L();
    openOverlay(`
      <div class="eyebrow">Upgrade!</div>
      <h2>${lv.icon} ${lv.name}</h2>
      <p>축하해요! 가게가 <strong>${lv.name}</strong>(으)로 커졌어요!<br><br>이제 한 번에 <strong>${lv.batch}개</strong>까지 만들 수 있고,<br>손님도 더 많이 와요!</p>
      <button class="btn-main" id="upContBtn">다음 날 ▶</button>
    `);
    $('upContBtn').onclick=()=>{ day++; startDay(); };
    updateHUD();
  }

  function updateHUD(){
    const lv=L();
    shopName.textContent=lv.icon+' '+lv.name+' 가게';
    dayEl.textContent=day; cashEl.textContent=fmt(cash); stockEl.textContent=stock; lvEl.textContent=lv.name;
    batchCost.textContent=fmt(lv.cost);
    makeBtn.querySelector('.sub').innerHTML=lv.batch+'개 / '+fmt(lv.cost)+'원';
  }
  function setHint(msg,warn){
    hintBar.textContent=msg; hintBar.style.color=warn?'var(--red)':'var(--sub)'; hintBar.style.fontWeight=warn?'900':'700';
    if(warn){ clearTimeout(setHint._t); setHint._t=setTimeout(()=>setHint('손님 주문을 받아 거스름돈을 만들어 주세요'),1900); }
  }

  // ===== Loop =====
  function loop(ts){ const dt=Math.min(50,ts-lastTs||16.67); lastTs=ts; if(state==='playing') update(ts,dt); draw(ts); raf=requestAnimationFrame(loop); }
  function update(ts,dt){
    const f=dt/16.67, elapsed=(ts-dayStart)/1000;
    const active=customers.filter(c=>!c.leaving&&!c.done).length;
    const maxQ=2+Math.floor(level/2);
    if(ts-lastSpawn>spawnGap && active<Math.min(4,maxQ) && elapsed<DAY_SECONDS){
      customers.push(makeCustomer()); lastSpawn=ts; spawnGap=spawnGapForLevel();
    }
    let slot=0;
    for(const c of customers){
      c.bob+=0.05*f;
      if(!c.done&&!c.leaving){
        c.slot=slot++;
        if(ts-c.born>c.patience){ c.leaving=true; c.leaveAt=ts; leftToday++;
          fx.push({type:'text',x:c.x,y:H-180,text:'😡 떠남',color:'#D34234',life:40,vy:-.6}); }
      }
      const tx=70+c.slot*72; c.x+=(tx-c.x)*0.12*f;
    }
    customers=customers.filter(c=>{ if(c.done&&now()-c.doneAt>500)return false; if(c.leaving&&ts-c.leaveAt>500)return false; return true; });
    for(const p of fx){ p.life-=f; if(p.type==='text')p.y+=p.vy*f; }
    fx=fx.filter(p=>p.life>0);
    if(elapsed>=DAY_SECONDS){ setHint('마감! 남은 손님 정리 중…'); if(!customers.some(c=>!c.done&&!c.leaving)) endDay(); }
    updateHUD();
  }

  // ===== Draw =====
  function clearBacking(){ ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.restore(); }
  function draw(ts){
    clearBacking();
    const lv=L();
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,lv.sky[0]); g.addColorStop(0.62,lv.sky[1]); g.addColorStop(0.62,lv.ground); g.addColorStop(1,lv.ground);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    if(level<5){ ctx.fillStyle='#F2C94C'; ctx.beginPath(); ctx.arc(W-54,60,24,0,7); ctx.fill();
      ctx.fillStyle='rgba(242,201,76,.3)'; ctx.beginPath(); ctx.arc(W-54,60,34,0,7); ctx.fill(); }
    else { for(let i=0;i<8;i++){ ctx.fillStyle=i%2?'#F2C94C':'#E8A0BF'; ctx.beginPath(); ctx.arc(30+i*52,40,4,0,7); ctx.fill(); } }
    const sorted=customers.slice().sort((a,b)=>b.slot-a.slot);
    for(const c of sorted) drawCustomer(c,ts);
    drawStand(lv);
    for(const p of fx){ if(p.type==='text'){ const a=Math.max(0,Math.min(1,p.life/44));
      ctx.globalAlpha=a; ctx.fillStyle=p.color; ctx.font='950 16px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.lineWidth=3.5; ctx.strokeStyle='#fff'; ctx.strokeText(p.text,p.x,p.y); ctx.fillText(p.text,p.x,p.y); ctx.globalAlpha=1; } }
    if(state==='playing'||state==='changing'){
      const elapsed=(now()-dayStart)/1000, ratio=Math.max(0,1-elapsed/DAY_SECONDS);
      ctx.fillStyle='rgba(10,10,10,.12)'; ctx.fillRect(12,12,W-24,7);
      ctx.fillStyle='#D4A843'; ctx.fillRect(12,12,(W-24)*ratio,7);
      ctx.fillStyle=level>=5?'#fff':'#0A0A0A'; ctx.font='900 11px system-ui'; ctx.textAlign='right'; ctx.textBaseline='top';
      ctx.fillText('⏱ '+Math.ceil(Math.max(0,DAY_SECONDS-elapsed))+'초', W-14, 22);
    }
  }
  function drawCustomer(c,ts){
    const baseY=H-210, bob=Math.sin(c.bob)*2, x=c.x, y=baseY+bob;
    const scale=c.slot===0?1:0.84;
    ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
    ctx.fillStyle=c.leaving?'#9aa0a6':c.color; ctx.beginPath(); ctx.roundRect(-15,6,30,34,8); ctx.fill();
    ctx.fillStyle=c.leaving?'#b8bcc0':'#F2D5B8'; ctx.beginPath(); ctx.arc(0,-8,14,0,7); ctx.fill();
    if(c.done){ ctx.strokeStyle='#0A0A0A'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,-6,6,0.1*Math.PI,0.9*Math.PI); ctx.stroke();
      ctx.fillStyle='#0A0A0A'; ctx.beginPath(); ctx.arc(-5,-11,1.6,0,7); ctx.arc(5,-11,1.6,0,7); ctx.fill(); }
    else if(c.leaving){ ctx.strokeStyle='#D34234'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,-4,5,1.1*Math.PI,1.9*Math.PI); ctx.stroke(); }
    else { ctx.fillStyle='#0A0A0A'; ctx.beginPath(); ctx.arc(-5,-10,1.8,0,7); ctx.arc(5,-10,1.8,0,7); ctx.fill();
      ctx.strokeStyle='#0A0A0A'; ctx.lineWidth=1.6; ctx.beginPath(); ctx.moveTo(-4,-3); ctx.lineTo(4,-3); ctx.stroke(); }
    ctx.restore();
    // order bubble
    if(!c.done&&!c.leaving){
      const label=c.order.map(o=>MENU[o.mi].icon+o.qty).join(' ');
      ctx.font='950 15px system-ui'; const tw=ctx.measureText(label).width;
      const bw=Math.max(46, tw+20), bx=x, by=y-48;
      ctx.fillStyle='#fff'; ctx.strokeStyle='#0A0A0A'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect(bx-bw/2,by-17,bw,30,9); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx-5,by+11); ctx.lineTo(bx+5,by+11); ctx.lineTo(bx,by+19); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#0A0A0A'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(label,bx,by-2);
      const pr=Math.max(0,1-(now()-c.born)/c.patience);
      ctx.fillStyle='rgba(10,10,10,.15)'; ctx.fillRect(bx-bw/2+4,by+15,bw-8,4);
      ctx.fillStyle=pr>0.5?'#2C7A4D':pr>0.25?'#D4A843':'#D34234'; ctx.fillRect(bx-bw/2+4,by+15,(bw-8)*pr,4);
    }
  }
  function drawStand(lv){
    const cy=H-150;
    ctx.fillStyle='#C9824B'; ctx.fillRect(0,cy,W,150);
    ctx.fillStyle='#A86534'; ctx.fillRect(0,cy,W,8);
    ctx.fillStyle='#FFF8E6'; ctx.strokeStyle='#A86534'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.roundRect(W/2-86,cy+14,172,40,10); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#D4A843'; ctx.font='950 15px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(lv.icon+' '+lv.name+' 가게',W/2,cy+27);
    ctx.fillStyle='#0A0A0A'; ctx.font='800 11px system-ui';
    ctx.fillText('메뉴 5종 · 재고 '+stock+'개',W/2,cy+44);
    const showN=Math.min(9,stock);
    for(let i=0;i<showN;i++){ const cx=16+i*19; ctx.fillStyle='#F2C94C'; ctx.beginPath(); ctx.roundRect(cx,cy-19,13,17,3); ctx.fill();
      ctx.fillStyle='#fff'; ctx.fillRect(cx+2,cy-19,9,3); }
    if(stock>9){ ctx.fillStyle='#0A0A0A'; ctx.font='900 12px system-ui'; ctx.textAlign='left'; ctx.fillText('+'+(stock-9),16+9*19,cy-11); }
  }

  // ===== Input =====
  function sizeCanvas(){
    const r=stage.getBoundingClientRect(), dpr=Math.max(1,window.devicePixelRatio||1);
    const scale=Math.min(r.width/W,r.height/H);
    canvas.width=Math.round(r.width*dpr); canvas.height=Math.round(r.height*dpr);
    ctx.setTransform(dpr*scale,0,0,dpr*scale,(r.width-W*scale)*dpr/2,(r.height-H*scale)*dpr/2);
  }
  window.addEventListener('resize', sizeCanvas);
  stage.addEventListener('pointerdown', e=>{ if(state==='playing'){ serveFront(); if(e.cancelable)e.preventDefault(); } });
  makeBtn.addEventListener('click', makeBatch);
  serveBtn.addEventListener('click', serveFront);

  // ===== Boot =====
  sizeCanvas(); showStart(); draw(now()); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
