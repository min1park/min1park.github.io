<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Janggi · 장기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F1EA; --bg-elev: #FBF8F2; --ink: #1B365D; --ink-soft: #5A6B82;
    --line: #D4CCBC; --gold: #B8935A;
    --board: #E4CC95; --board-line: #6B4A2A;
    --cho: #15803D; --han: #C0392B; --disc: #F2E6CB; --disc-edge: #8A6A38;
    --sel: rgba(184,147,90,0.9); --dot: rgba(27,54,93,0.5); --last: rgba(184,147,90,0.5); --check: #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "EB Garamond", "Noto Serif KR", Georgia, serif; background: var(--bg);
    background-image: radial-gradient(circle at 20% 10%, rgba(184,147,90,0.06), transparent 40%), radial-gradient(circle at 80% 90%, rgba(27,54,93,0.05), transparent 40%);
    color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 16px 12px; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .frame { width: 100%; max-width: 420px; }
  .header { text-align: center; margin-bottom: 12px; }
  .eyebrow { font-size: 0.7rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; }
  .title { font-family: "EB Garamond", serif; font-style: italic; font-weight: 500; font-size: 2.1rem; line-height: 1; }
  .title::after { content: ""; display: block; width: 32px; height: 1px; background: var(--gold); margin: 10px auto 0; }

  .modes, .difficulty, .setup { display: flex; gap: 0; margin-bottom: 8px; border: 1px solid var(--line); background: var(--bg-elev); }
  .difficulty.hidden { display: none; }
  .mode-btn, .diff-btn, .setup-btn { flex: 1; padding: 9px 4px; background: transparent; border: none; color: var(--ink-soft); font-family: inherit; font-size: 0.8rem; letter-spacing: 0.03em; cursor: pointer; transition: all 0.2s ease; }
  .mode-btn + .mode-btn, .diff-btn + .diff-btn, .setup-btn + .setup-btn { border-left: 1px solid var(--line); }
  .mode-btn.active { background: var(--ink); color: var(--bg-elev); }
  .diff-btn.active { background: var(--gold); color: var(--bg-elev); }
  .setup-btn.active { background: var(--cho); color: #fff; }
  .setup-label { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); text-align: center; margin-bottom: 3px; }
  .setup.locked { opacity: 0.5; pointer-events: none; }

  .status { text-align: center; font-size: 0.9rem; font-style: italic; color: var(--ink-soft); min-height: 22px; margin: 8px 0; letter-spacing: 0.02em; }
  .status.check { color: var(--han); font-style: normal; font-weight: 500; }
  .status.over { color: var(--ink); font-style: normal; font-weight: 500; letter-spacing: 0.08em; }

  .board-wrap { position: relative; aspect-ratio: 9 / 10; background: var(--board); border: 1px solid var(--board-line); box-shadow: 0 5px 16px rgba(60,40,20,0.18); margin-bottom: 12px; }
  .grid-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .grid-svg line { stroke: var(--board-line); stroke-width: 0.8; }
  .cell { position: absolute; width: 11.1%; height: 10%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; background: transparent; border: none; cursor: pointer; padding: 0; -webkit-tap-highlight-color: transparent; }
  .disc {
    width: 86%; aspect-ratio: 1; border-radius: 50%; background: var(--disc); border: 1.5px solid var(--disc-edge);
    display: flex; align-items: center; justify-content: center; font-family: "Noto Serif KR", serif; font-weight: 700;
    font-size: clamp(0.85rem, 4.6vw, 1.4rem); line-height: 1; box-shadow: 0 1px 2px rgba(0,0,0,0.25); user-select: none;
  }
  .disc.C { color: var(--cho); }
  .disc.H { color: var(--han); }
  .cell.sel .disc { box-shadow: 0 0 0 2.5px var(--sel), 0 1px 2px rgba(0,0,0,0.25); }
  .cell .dot { width: 26%; aspect-ratio: 1; border-radius: 50%; background: var(--dot); }
  .cell.cap .ring { position: absolute; width: 84%; aspect-ratio: 1; border: 3px solid var(--dot); border-radius: 50%; }
  .cell.last::before { content: ''; position: absolute; width: 30%; aspect-ratio: 1; border-radius: 50%; background: var(--last); z-index: -0; }
  .cell.check .disc { box-shadow: 0 0 0 3px var(--check), 0 1px 2px rgba(0,0,0,0.3); }

  .overlay { position: absolute; inset: 0; background: rgba(27,54,93,0.82); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); display: none; align-items: center; justify-content: center; padding: 18px; z-index: 10; animation: fadeIn 0.3s ease; }
  .overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .overlay-card { background: var(--bg-elev); border: 1px solid var(--gold); padding: 24px 20px; text-align: center; max-width: 300px; width: 100%; position: relative; }
  .overlay-card::before, .overlay-card::after { content: ""; position: absolute; width: 16px; height: 16px; border: 1px solid var(--gold); }
  .overlay-card::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .overlay-card::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
  .overlay-eyebrow { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 7px; }
  .overlay-title { font-family: "EB Garamond", serif; font-size: 1.5rem; color: var(--ink); margin-bottom: 14px; line-height: 1.2; }
  .overlay-btn { width: 100%; padding: 11px; border: 1px solid var(--ink); background: var(--ink); color: var(--bg-elev); font-family: inherit; font-size: 0.82rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; }
  .overlay-btn:hover { background: var(--gold); border-color: var(--gold); }

  .controls-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .btn { padding: 11px; background: transparent; border: 1px solid var(--ink); color: var(--ink); font-family: inherit; font-size: 0.82rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease; }
  .btn:hover, .btn:active { background: var(--ink); color: var(--bg-elev); }
  .btn.subtle { border-color: var(--line); color: var(--ink-soft); }
  .btn.subtle:hover { background: var(--ink-soft); color: var(--bg-elev); }
  .hint { text-align: center; font-size: 0.7rem; color: var(--ink-soft); letter-spacing: 0.04em; line-height: 1.6; }
  .footer { text-align: center; margin-top: 12px; font-size: 0.7rem; letter-spacing: 0.15em; color: var(--ink-soft); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="frame">
    <header class="header">
      <div class="eyebrow">Game · No. 14</div>
      <h1 class="title">Janggi</h1>
    </header>

    <div class="modes" role="tablist">
      <button class="mode-btn active" data-mode="ai">vs 컴퓨터</button>
      <button class="mode-btn" data-mode="2p">2인 플레이</button>
    </div>
    <div class="difficulty" id="difficultyBar" role="tablist">
      <button class="diff-btn" data-diff="easy">쉬움</button>
      <button class="diff-btn active" data-diff="medium">보통</button>
      <button class="diff-btn" data-diff="hard">어려움</button>
    </div>

    <div class="setup-label">마·상 배치 (첫 수 두기 전까지 변경 가능)</div>
    <div class="setup" id="setupBar">
      <button class="setup-btn active" data-setup="마상마상">마상마상</button>
      <button class="setup-btn" data-setup="상마상마">상마상마</button>
      <button class="setup-btn" data-setup="마상상마">마상상마</button>
      <button class="setup-btn" data-setup="상마마상">상마마상</button>
    </div>

    <div class="status" id="status">초(아래·초록) 차례</div>

    <div class="board-wrap">
      <svg class="grid-svg" id="gridSvg" viewBox="0 0 360 400" preserveAspectRatio="none"></svg>
      <div id="cells"></div>
      <div class="overlay" id="overlay">
        <div class="overlay-card">
          <div class="overlay-eyebrow" id="ovEyebrow">Result</div>
          <div class="overlay-title" id="ovTitle">외통수</div>
          <div id="ovBody"></div>
        </div>
      </div>
    </div>

    <div class="controls-meta">
      <button class="btn" id="newGameBtn">새 게임</button>
      <button class="btn subtle" id="undoBtn">한 수 무르기</button>
    </div>
    <div class="hint">기물을 탭하면 갈 수 있는 곳이 표시됩니다 · 표시된 점을 탭해 이동</div>
    <div class="footer">— Min1 Park · 2026 —</div>
  </div>

<script>
  // ===== Geometry =====
  const COLS = 9, ROWS = 10;
  const SQ = (r, c) => r * COLS + c;
  const RC = sq => [(sq / COLS) | 0, sq % COLS];
  const onBoard = (r, c) => r >= 0 && r < ROWS && c >= 0 && c < COLS;

  // Palace diagonal adjacency
  const PD = {};
  function addPD(a, b) { (PD[a] = PD[a] || []).push(b); (PD[b] = PD[b] || []).push(a); }
  addPD(SQ(1,4), SQ(0,3)); addPD(SQ(1,4), SQ(0,5)); addPD(SQ(1,4), SQ(2,3)); addPD(SQ(1,4), SQ(2,5));
  addPD(SQ(8,4), SQ(7,3)); addPD(SQ(8,4), SQ(7,5)); addPD(SQ(8,4), SQ(9,3)); addPD(SQ(8,4), SQ(9,5));
  const DIAG_LINES = [
    [SQ(0,3), SQ(1,4), SQ(2,5)], [SQ(0,5), SQ(1,4), SQ(2,3)],
    [SQ(7,3), SQ(8,4), SQ(9,5)], [SQ(7,5), SQ(8,4), SQ(9,3)],
  ];
  const LINE_OF = {};
  DIAG_LINES.forEach((line, li) => line.forEach((s, i) => { (LINE_OF[s] = LINE_OF[s] || []).push([li, i]); }));

  function inPalace(color, r, c) {
    if (c < 3 || c > 5) return false;
    return color === 'C' ? (r >= 7 && r <= 9) : (r >= 0 && r <= 2);
  }

  const colorOf = p => p ? p[0] : '';
  const typeOf = p => p ? p[1] : '';
  const enemy = c => c === 'C' ? 'H' : 'C';

  // ===== Setup =====
  const SETUPS = {
    '마상마상': { 1:'h', 2:'e', 6:'e', 7:'h' },
    '상마상마': { 1:'e', 2:'h', 6:'h', 7:'e' },
    '마상상마': { 1:'h', 2:'e', 6:'h', 7:'e' },
    '상마마상': { 1:'e', 2:'h', 6:'e', 7:'h' },
  };
  function buildInitial(setupName) {
    const b = new Array(ROWS * COLS).fill('');
    const arr = SETUPS[setupName];
    // Han (top)
    b[SQ(0,0)] = 'Hr'; b[SQ(0,8)] = 'Hr';
    b[SQ(0,3)] = 'Ha'; b[SQ(0,5)] = 'Ha';
    b[SQ(1,4)] = 'Hg';
    b[SQ(2,1)] = 'Hc'; b[SQ(2,7)] = 'Hc';
    for (const c of [0,2,4,6,8]) b[SQ(3,c)] = 'Hs';
    for (const c of [1,2,6,7]) b[SQ(0,c)] = 'H' + arr[c];
    // Cho (bottom)
    b[SQ(9,0)] = 'Cr'; b[SQ(9,8)] = 'Cr';
    b[SQ(9,3)] = 'Ca'; b[SQ(9,5)] = 'Ca';
    b[SQ(8,4)] = 'Cg';
    b[SQ(7,1)] = 'Cc'; b[SQ(7,7)] = 'Cc';
    for (const c of [0,2,4,6,8]) b[SQ(6,c)] = 'Cs';
    for (const c of [1,2,6,7]) b[SQ(9,c)] = 'C' + arr[c];
    return { board: b, turn: 'C' };
  }

  // ===== Move generation =====
  const ORTHO = [[-1,0],[1,0],[0,-1],[0,1]];
  const HORSE = [
    {tr:-2,tc:-1,lr:-1,lc:0},{tr:-2,tc:1,lr:-1,lc:0},{tr:2,tc:-1,lr:1,lc:0},{tr:2,tc:1,lr:1,lc:0},
    {tr:-1,tc:-2,lr:0,lc:-1},{tr:1,tc:-2,lr:0,lc:-1},{tr:-1,tc:2,lr:0,lc:1},{tr:1,tc:2,lr:0,lc:1},
  ];
  const ELEPH = [
    {tr:-3,tc:-2,b:[[-1,0],[-2,-1]]},{tr:-3,tc:2,b:[[-1,0],[-2,1]]},{tr:3,tc:-2,b:[[1,0],[2,-1]]},{tr:3,tc:2,b:[[1,0],[2,1]]},
    {tr:-2,tc:-3,b:[[0,-1],[-1,-2]]},{tr:2,tc:-3,b:[[0,-1],[1,-2]]},{tr:-2,tc:3,b:[[0,1],[-1,2]]},{tr:2,tc:3,b:[[0,1],[1,2]]},
  ];

  function genPseudo(board, color) {
    const moves = [];
    for (let sq = 0; sq < ROWS * COLS; sq++) {
      const p = board[sq];
      if (!p || colorOf(p) !== color) continue;
      const t = typeOf(p);
      const [r, c] = RC(sq);
      if (t === 'g' || t === 'a') genPalace(board, color, sq, r, c, moves);
      else if (t === 'r') genChariot(board, color, sq, r, c, moves);
      else if (t === 'c') genCannon(board, color, sq, r, c, moves);
      else if (t === 'h') genHorse(board, color, sq, r, c, moves);
      else if (t === 'e') genElephant(board, color, sq, r, c, moves);
      else if (t === 's') genSoldier(board, color, sq, r, c, moves);
    }
    return moves;
  }

  function genPalace(board, color, sq, r, c, moves) {
    for (const [dr, dc] of ORTHO) {
      const nr = r + dr, nc = c + dc;
      if (inPalace(color, nr, nc) && colorOf(board[SQ(nr, nc)]) !== color) moves.push({ from: sq, to: SQ(nr, nc) });
    }
    for (const nsq of (PD[sq] || [])) {
      const [nr, nc] = RC(nsq);
      if (inPalace(color, nr, nc) && colorOf(board[nsq]) !== color) moves.push({ from: sq, to: nsq });
    }
  }

  function genChariot(board, color, sq, r, c, moves) {
    for (const [dr, dc] of ORTHO) {
      let nr = r + dr, nc = c + dc;
      while (onBoard(nr, nc)) {
        const tp = board[SQ(nr, nc)];
        if (!tp) moves.push({ from: sq, to: SQ(nr, nc) });
        else { if (colorOf(tp) !== color) moves.push({ from: sq, to: SQ(nr, nc) }); break; }
        nr += dr; nc += dc;
      }
    }
    for (const [li, i] of (LINE_OF[sq] || [])) {
      const line = DIAG_LINES[li];
      for (let j = i + 1; j < line.length; j++) { const tp = board[line[j]]; if (!tp) moves.push({ from: sq, to: line[j] }); else { if (colorOf(tp) !== color) moves.push({ from: sq, to: line[j] }); break; } }
      for (let j = i - 1; j >= 0; j--) { const tp = board[line[j]]; if (!tp) moves.push({ from: sq, to: line[j] }); else { if (colorOf(tp) !== color) moves.push({ from: sq, to: line[j] }); break; } }
    }
  }

  function genCannon(board, color, sq, r, c, moves) {
    for (const [dr, dc] of ORTHO) {
      let nr = r + dr, nc = c + dc, screen = false;
      while (onBoard(nr, nc)) {
        const tp = board[SQ(nr, nc)];
        if (!screen) {
          if (tp) { if (typeOf(tp) === 'c') break; screen = true; }
        } else {
          if (!tp) moves.push({ from: sq, to: SQ(nr, nc) });
          else { if (typeOf(tp) !== 'c' && colorOf(tp) !== color) moves.push({ from: sq, to: SQ(nr, nc) }); break; }
        }
        nr += dr; nc += dc;
      }
    }
    // diagonal jump: from a corner over the palace center
    for (const [li, i] of (LINE_OF[sq] || [])) {
      if (i === 1) continue;
      const line = DIAG_LINES[li];
      const center = line[1], other = line[i === 0 ? 2 : 0];
      const sp = board[center];
      if (!sp || typeOf(sp) === 'c') continue;
      const tp = board[other];
      if (!tp) moves.push({ from: sq, to: other });
      else if (typeOf(tp) !== 'c' && colorOf(tp) !== color) moves.push({ from: sq, to: other });
    }
  }

  function genHorse(board, color, sq, r, c, moves) {
    for (const d of HORSE) {
      const nr = r + d.tr, nc = c + d.tc;
      if (!onBoard(nr, nc)) continue;
      if (board[SQ(r + d.lr, c + d.lc)]) continue; // leg blocked
      if (colorOf(board[SQ(nr, nc)]) !== color) moves.push({ from: sq, to: SQ(nr, nc) });
    }
  }

  function genElephant(board, color, sq, r, c, moves) {
    for (const d of ELEPH) {
      const nr = r + d.tr, nc = c + d.tc;
      if (!onBoard(nr, nc)) continue;
      let blocked = false;
      for (const [br, bc] of d.b) { if (board[SQ(r + br, c + bc)]) { blocked = true; break; } }
      if (blocked) continue;
      if (colorOf(board[SQ(nr, nc)]) !== color) moves.push({ from: sq, to: SQ(nr, nc) });
    }
  }

  function genSoldier(board, color, sq, r, c, moves) {
    const fwd = color === 'C' ? -1 : 1;
    if (onBoard(r + fwd, c) && colorOf(board[SQ(r + fwd, c)]) !== color) moves.push({ from: sq, to: SQ(r + fwd, c) });
    for (const dc of [-1, 1]) if (onBoard(r, c + dc) && colorOf(board[SQ(r, c + dc)]) !== color) moves.push({ from: sq, to: SQ(r, c + dc) });
    for (const nsq of (PD[sq] || [])) {
      const [nr] = RC(nsq);
      const forward = color === 'C' ? nr < r : nr > r;
      if (forward && colorOf(board[nsq]) !== color) moves.push({ from: sq, to: nsq });
    }
  }

  // ===== Apply / legality =====
  function applyMove(st, m) {
    const b = st.board.slice();
    b[m.to] = b[m.from]; b[m.from] = '';
    return { board: b, turn: enemy(st.turn) };
  }
  function findGeneral(board, color) {
    const g = color + 'g';
    for (let i = 0; i < board.length; i++) if (board[i] === g) return i;
    return -1;
  }
  function isAttacked(board, sq, by) {
    const ms = genPseudo(board, by);
    for (const m of ms) if (m.to === sq) return true;
    return false;
  }
  function inCheck(st, color) {
    const g = findGeneral(st.board, color);
    if (g < 0) return true;
    return isAttacked(st.board, g, enemy(color));
  }
  function generalsFace(board) {
    const cg = findGeneral(board, 'C'), hg = findGeneral(board, 'H');
    if (cg < 0 || hg < 0) return false;
    const [cr, cc] = RC(cg), [hr, hc] = RC(hg);
    if (cc !== hc) return false;
    const lo = Math.min(cr, hr) + 1, hi = Math.max(cr, hr);
    for (let r = lo; r < hi; r++) if (board[SQ(r, cc)]) return false;
    return true;
  }
  function legalMoves(st, color) {
    const out = [];
    for (const m of genPseudo(st.board, color)) {
      const ns = applyMove(st, m);
      if (!inCheck(ns, color) && !generalsFace(ns.board)) out.push(m);
    }
    return out;
  }

  // ===== Evaluation & AI =====
  const MAT = { r:1300, c:700, h:500, e:300, a:300, s:200, g:0 };
  function evaluate(board) {
    let s = 0;
    for (let sq = 0; sq < board.length; sq++) {
      const p = board[sq];
      if (!p) continue;
      const t = typeOf(p);
      let v = MAT[t];
      if (t === 's') { const r = (sq / COLS) | 0; v += colorOf(p) === 'C' ? (6 - r) * 6 : (r - 3) * 6; }
      s += colorOf(p) === 'C' ? v : -v;
    }
    return s;
  }
  function orderMoves(board, moves) {
    return moves.map(m => ({ m, sc: board[m.to] ? MAT[typeOf(board[m.to])] : 0 }))
      .sort((a, z) => z.sc - a.sc).map(x => x.m);
  }
  const MATE = 1e7;
  function negamax(st, depth, alpha, beta, ply) {
    const moves = legalMoves(st, st.turn);
    if (moves.length === 0) return -MATE + ply; // no legal move = loss (mate/stalemate-loss)
    if (depth === 0) { const e = evaluate(st.board); return st.turn === 'C' ? e : -e; }
    let best = -Infinity;
    for (const m of orderMoves(st.board, moves)) {
      const ns = applyMove(st, m);
      const sc = -negamax(ns, depth - 1, -beta, -alpha, ply + 1);
      if (sc > best) best = sc;
      if (best > alpha) alpha = best;
      if (alpha >= beta) break;
    }
    return best;
  }
  function aiBestMove(st, depth) {
    const moves = orderMoves(st.board, legalMoves(st, st.turn));
    if (moves.length === 0) return null;
    let best = -Infinity, alpha = -Infinity; const scored = [];
    for (const m of moves) {
      const ns = applyMove(st, m);
      const sc = -negamax(ns, depth - 1, -Infinity, -alpha, 1);
      scored.push({ m, sc });
      if (sc > best) best = sc;
      if (sc > alpha) alpha = sc;
    }
    const top = scored.filter(x => x.sc >= best - 15).map(x => x.m);
    return top[(Math.random() * top.length) | 0];
  }

  // ===== Game state (UI) =====
  const GLYPH = { Cg:'楚', Hg:'漢', Ca:'士', Ha:'士', Cr:'車', Hr:'車', Cc:'包', Hc:'包', Ch:'馬', Hh:'馬', Ce:'象', He:'象', Cs:'卒', Hs:'兵' };
  let setupName = '마상마상';
  let state = buildInitial(setupName);
  let history = [];
  let mode = 'ai', difficulty = 'medium';
  let selected = -1, legalForSel = [], lastMove = null;
  let gameStatus = 'playing', busy = false;

  // ===== Build board DOM =====
  const cellsWrap = document.getElementById('cells');
  const gridSvg = document.getElementById('gridSvg');
  let cells = [];
  function px(c) { return 20 + c * 40; }
  function py(r) { return 20 + r * 40; }
  function drawGrid() {
    let s = '';
    for (let c = 0; c < COLS; c++) s += `<line x1="${px(c)}" y1="${py(0)}" x2="${px(c)}" y2="${py(9)}"/>`;
    for (let r = 0; r < ROWS; r++) s += `<line x1="${px(0)}" y1="${py(r)}" x2="${px(8)}" y2="${py(r)}"/>`;
    // palace diagonals
    s += `<line x1="${px(3)}" y1="${py(0)}" x2="${px(5)}" y2="${py(2)}"/><line x1="${px(5)}" y1="${py(0)}" x2="${px(3)}" y2="${py(2)}"/>`;
    s += `<line x1="${px(3)}" y1="${py(7)}" x2="${px(5)}" y2="${py(9)}"/><line x1="${px(5)}" y1="${py(7)}" x2="${px(3)}" y2="${py(9)}"/>`;
    gridSvg.innerHTML = s;
  }
  function buildCells() {
    cellsWrap.innerHTML = ''; cells = [];
    for (let sq = 0; sq < ROWS * COLS; sq++) {
      const [r, c] = RC(sq);
      const cell = document.createElement('button');
      cell.className = 'cell';
      cell.style.left = (px(c) / 360 * 100) + '%';
      cell.style.top = (py(r) / 400 * 100) + '%';
      cell.addEventListener('click', () => onCell(sq));
      cellsWrap.appendChild(cell);
      cells.push(cell);
    }
  }

  function render() {
    const b = state.board;
    const targets = new Set(legalForSel.map(m => m.to));
    const checkSq = (gameStatus === 'playing') && inCheck(state, state.turn) ? findGeneral(b, state.turn) : -1;
    for (let sq = 0; sq < b.length; sq++) {
      const cell = cells[sq];
      let cls = 'cell';
      if (sq === selected) cls += ' sel';
      if (lastMove && (sq === lastMove.from || sq === lastMove.to)) cls += ' last';
      if (sq === checkSq) cls += ' check';
      const isTarget = targets.has(sq);
      if (isTarget && b[sq]) cls += ' cap';
      cell.className = cls;
      const p = b[sq];
      let inner = '';
      if (p) inner += `<span class="disc ${colorOf(p)}">${GLYPH[p]}</span>`;
      if (isTarget) inner += b[sq] ? `<span class="ring"></span>` : `<span class="dot"></span>`;
      cell.innerHTML = inner;
    }
  }

  function setStatus() {
    const st = document.getElementById('status');
    if (gameStatus === 'over') return;
    const checking = inCheck(state, state.turn);
    if (busy && mode === 'ai') { st.textContent = '컴퓨터가 생각 중…'; st.className = 'status'; return; }
    let txt = state.turn === 'C' ? '초(아래·초록) 차례' : '한(위·빨강) 차례';
    if (checking) { txt += ' · 장군!'; st.className = 'status check'; } else st.className = 'status';
    st.textContent = txt;
  }

  // ===== Interaction =====
  function onCell(sq) {
    if (busy || gameStatus !== 'playing') return;
    if (mode === 'ai' && state.turn === 'H') return;
    const b = state.board, p = b[sq];
    if (selected === -1) { if (p && colorOf(p) === state.turn) select(sq); return; }
    if (sq === selected) { selected = -1; legalForSel = []; render(); return; }
    const mv = legalForSel.find(m => m.to === sq);
    if (mv) doMove(mv);
    else if (p && colorOf(p) === state.turn) select(sq);
    else { selected = -1; legalForSel = []; render(); }
  }
  function select(sq) {
    selected = sq;
    legalForSel = legalMoves(state, state.turn).filter(m => m.from === sq);
    render();
  }

  function doMove(m) {
    history.push({ state, lastMove });
    state = applyMove(state, m);
    lastMove = { from: m.from, to: m.to };
    selected = -1; legalForSel = [];
    lockSetup();
    render();
    const legals = legalMoves(state, state.turn);
    if (legals.length === 0) {
      gameStatus = 'over';
      const winner = enemy(state.turn);
      const checked = inCheck(state, state.turn);
      showResult(checked ? '외통수 (장군!)' : '외통수',
        (winner === 'C' ? '초(아래·초록)' : '한(위·빨강)') + ' 승리');
      setStatus(); return;
    }
    setStatus();
    if (mode === 'ai' && state.turn === 'H') computerMove();
  }

  function computerMove() {
    busy = true; setStatus();
    setTimeout(() => {
      let mv;
      if (difficulty === 'easy') {
        const ls = legalMoves(state, 'H');
        mv = Math.random() < 0.35 ? ls[(Math.random() * ls.length) | 0] : aiBestMove(state, 1);
      } else if (difficulty === 'hard') mv = aiBestMove(state, 3);
      else mv = aiBestMove(state, 2);
      busy = false;
      if (mv) doMove(mv);
    }, 130);
  }

  // ===== Overlay / controls =====
  function showResult(title, body) {
    const overlay = document.getElementById('overlay');
    document.getElementById('ovEyebrow').textContent = 'Result';
    document.getElementById('ovTitle').textContent = title;
    document.getElementById('ovBody').innerHTML = `<p style="font-size:0.9rem;color:var(--ink-soft);margin-bottom:14px;">${body}</p><button class="overlay-btn" id="ovRestart">새 게임</button>`;
    document.getElementById('ovRestart').addEventListener('click', newGame);
    overlay.classList.add('show');
  }
  function newGame() {
    state = buildInitial(setupName);
    history = []; selected = -1; legalForSel = []; lastMove = null; gameStatus = 'playing'; busy = false;
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('setupBar').classList.remove('locked');
    render(); setStatus();
  }
  function lockSetup() { document.getElementById('setupBar').classList.add('locked'); }
  function undo() {
    if (busy) return;
    if (history.length === 0) return;
    let steps = (mode === 'ai' && history.length >= 2 && state.turn === 'C') ? 2 : 1;
    while (steps-- > 0 && history.length > 0) { const h = history.pop(); state = h.state; lastMove = h.lastMove; }
    gameStatus = 'playing'; selected = -1; legalForSel = [];
    document.getElementById('overlay').classList.remove('show');
    if (history.length === 0) document.getElementById('setupBar').classList.remove('locked');
    render(); setStatus();
  }

  // ===== Mode / difficulty / setup =====
  const difficultyBar = document.getElementById('difficultyBar');
  document.querySelectorAll('.mode-btn').forEach(btn => btn.addEventListener('click', () => {
    if (btn.classList.contains('active')) return;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); mode = btn.dataset.mode;
    difficultyBar.classList.toggle('hidden', mode !== 'ai'); newGame();
  }));
  document.querySelectorAll('.diff-btn').forEach(btn => btn.addEventListener('click', () => {
    if (btn.classList.contains('active')) return;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); difficulty = btn.dataset.diff; newGame();
  }));
  document.querySelectorAll('.setup-btn').forEach(btn => btn.addEventListener('click', () => {
    if (history.length > 0 || btn.classList.contains('active')) return;
    document.querySelectorAll('.setup-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); setupName = btn.dataset.setup; newGame();
  }));
  document.getElementById('newGameBtn').addEventListener('click', newGame);
  document.getElementById('undoBtn').addEventListener('click', undo);

  // ===== Boot =====
  drawGrid(); buildCells(); render(); setStatus();
</script>
</body>
</html>
