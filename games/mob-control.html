<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mob Control · 몹 컨트롤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F1EA; --bg-elev: #FBF8F2; --ink: #1B365D; --ink-soft: #5A6B82;
    --line: #D4CCBC; --gold: #B8935A; --gold-deep: #8A6A38;
    --play: #1B365D; --enemy: #C0392B;
    --good: #2C7A4D; --bad: #C0392B; --mult: #B8935A;
    --field: #EFE4CC;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "EB Garamond", "Noto Serif KR", Georgia, serif;
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 10%, rgba(184,147,90,0.06), transparent 40%), radial-gradient(circle at 80% 90%, rgba(27,54,93,0.05), transparent 40%);
    color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 18px 12px; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .frame { width: 100%; max-width: 400px; }
  .header { text-align: center; margin-bottom: 14px; }
  .eyebrow { font-size: 0.7rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; }
  .title { font-family: "EB Garamond", serif; font-style: italic; font-weight: 500; font-size: 2.2rem; line-height: 1; }
  .title::after { content: ""; display: block; width: 32px; height: 1px; background: var(--gold); margin: 12px auto 0; }

  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--line); border: 1px solid var(--line); margin-bottom: 10px; }
  .stat-cell { background: var(--bg-elev); padding: 9px 4px; text-align: center; }
  .stat-label { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 2px; }
  .stat-value { font-family: "EB Garamond", serif; font-size: 1.15rem; font-weight: 500; font-variant-numeric: tabular-nums; }
  .stat-cell.best .stat-value { color: var(--gold); font-style: italic; }
  .stat-cell.army .stat-value { color: var(--ink); }
  .stat-cell.stage .stat-value { color: var(--gold-deep); }

  .status { text-align: center; font-size: 0.9rem; font-style: italic; color: var(--ink-soft); min-height: 22px; margin: 8px 0; letter-spacing: 0.02em; }
  .status.go { color: var(--gold); font-style: normal; letter-spacing: 0.06em; }
  .status.win { color: var(--good); font-style: normal; font-weight: 500; letter-spacing: 0.1em; }
  .status.lose { color: var(--bad); font-style: normal; font-weight: 500; letter-spacing: 0.1em; }

  .board-wrap { position: relative; aspect-ratio: 3 / 5; background: var(--field); border: 1px solid var(--ink); box-shadow: 0 6px 18px rgba(60,40,20,0.18); margin-bottom: 12px; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; cursor: pointer; }
  canvas { display: block; width: 100%; height: 100%; }

  .overlay { position: absolute; inset: 0; background: rgba(27,54,93,0.82); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); display: none; align-items: center; justify-content: center; padding: 18px; z-index: 5; animation: fadeIn 0.3s ease; }
  .overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .overlay-card { background: var(--bg-elev); border: 1px solid var(--gold); padding: 22px 18px; text-align: center; max-width: 290px; width: 100%; position: relative; }
  .overlay-card::before, .overlay-card::after { content: ""; position: absolute; width: 16px; height: 16px; border: 1px solid var(--gold); }
  .overlay-card::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .overlay-card::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
  .overlay-eyebrow { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 7px; }
  .overlay-title { font-family: "EB Garamond", serif; font-style: italic; font-size: 1.45rem; color: var(--gold); margin-bottom: 12px; line-height: 1.2; }
  .overlay.lose .overlay-title { color: var(--bad); font-style: normal; }
  .overlay.win .overlay-title { color: var(--good); font-style: normal; }
  .overlay-stat { font-size: 0.85rem; color: var(--ink-soft); margin-bottom: 14px; line-height: 1.5; }
  .overlay-stat strong { font-family: "EB Garamond", serif; font-weight: 500; color: var(--ink); font-size: 1.05rem; }
  .overlay-btn { width: 100%; padding: 11px; border: 1px solid var(--ink); background: var(--ink); color: var(--bg-elev); font-family: inherit; font-size: 0.82rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; }
  .overlay-btn:hover { background: var(--gold); border-color: var(--gold); }

  .controls-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .btn { padding: 11px; background: transparent; border: 1px solid var(--ink); color: var(--ink); font-family: inherit; font-size: 0.82rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease; }
  .btn:hover, .btn:active { background: var(--ink); color: var(--bg-elev); }
  .btn.subtle { border-color: var(--line); color: var(--ink-soft); }
  .btn.subtle:hover { background: var(--ink-soft); color: var(--bg-elev); }
  .hint { text-align: center; font-size: 0.7rem; color: var(--ink-soft); letter-spacing: 0.04em; line-height: 1.6; }
  .footer { text-align: center; margin-top: 14px; font-size: 0.7rem; letter-spacing: 0.15em; color: var(--ink-soft); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="frame">
    <header class="header">
      <div class="eyebrow">Game · No. 15</div>
      <h1 class="title">Mob Control</h1>
    </header>

    <div class="stats">
      <div class="stat-cell stage"><div class="stat-label">Stage</div><div class="stat-value" id="stageEl">1</div></div>
      <div class="stat-cell army"><div class="stat-label">내 군대</div><div class="stat-value" id="armyEl">10</div></div>
      <div class="stat-cell best"><div class="stat-label">최고</div><div class="stat-value" id="bestEl">1</div></div>
    </div>

    <div class="status" id="status">시작 버튼을 누르세요</div>

    <div class="board-wrap" id="boardWrap">
      <canvas id="canvas"></canvas>
      <div class="overlay show" id="overlay">
        <div class="overlay-card">
          <div class="overlay-eyebrow" id="ovEyebrow">Ready</div>
          <div class="overlay-title" id="ovTitle">몹 컨트롤</div>
          <div class="overlay-stat" id="ovStat">스포너를 좌우로 드래그해 게이트를 통과하세요.<br>
            <strong style="color:var(--good)">+5 · ×2</strong> 같은 게이트로 군대를 늘리고,<br>
            끝의 <strong style="color:var(--bad)">적</strong>이 도착 전에 격파해야 합니다.</div>
          <button class="overlay-btn" id="ovBtn">시작</button>
        </div>
      </div>
    </div>

    <div class="controls-meta">
      <button class="btn" id="newGameBtn">새 게임</button>
      <button class="btn subtle" id="pauseBtn">일시정지</button>
    </div>
    <div class="hint">화면을 좌우로 드래그하면 스포너가 따라옵니다 (PC는 ←→ 키)</div>
    <div class="footer">— Min1 Park · 2026 —</div>
  </div>

<script>
  // ===== Setup =====
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const boardWrap = document.getElementById('boardWrap');
  const stageEl = document.getElementById('stageEl');
  const armyEl = document.getElementById('armyEl');
  const bestEl = document.getElementById('bestEl');
  const statusEl = document.getElementById('status');
  const overlay = document.getElementById('overlay');
  const ovEyebrow = document.getElementById('ovEyebrow');
  const ovTitle = document.getElementById('ovTitle');
  const ovStat = document.getElementById('ovStat');
  const ovBtn = document.getElementById('ovBtn');
  const newGameBtn = document.getElementById('newGameBtn');
  const pauseBtn = document.getElementById('pauseBtn');

  const C = {
    field: '#EFE4CC', wall: '#D4CCBC',
    spawner: '#1B365D', spawnerEdge: '#0C1F3D',
    stickman: '#1B365D',
    enemy: '#C0392B', enemyDark: '#8A2A1F',
    gateGood: '#2C7A4D', gateBad: '#C0392B', gateMult: '#B8935A',
    text: '#FBF8F2', ink: '#1B365D',
    track: 'rgba(120,100,70,0.10)',
  };

  // Game-space coordinates (canvas scaled to fit)
  const W = 360, H = 600;
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = boardWrap.getBoundingClientRect();
    if (rect.width < 1) return;
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    const scale = rect.width / W;
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
  }
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('load', resizeCanvas);

  // ===== State =====
  const SPAWNER_Y = H - 60;
  const SPAWNER_W = 50, SPAWNER_H = 30;
  const STICK_R = 5;
  const STICK_SPEED = 7;          // px / frame at 60fps
  const SCROLL_SPEED = 1.4;       // world scrolls down at this rate
  const SPAWN_MS = 110;
  const GATE_H = 44, GATE_GAP = 14; // center wall gap
  const ENEMY_H = 70;

  const EFFECTS = [
    { type:'+', val:3, label:'+3', color:C.gateGood },
    { type:'+', val:5, label:'+5', color:C.gateGood },
    { type:'+', val:8, label:'+8', color:C.gateGood },
    { type:'+', val:12, label:'+12', color:C.gateGood },
    { type:'*', val:2, label:'×2', color:C.gateMult },
    { type:'*', val:3, label:'×3', color:C.gateMult },
    { type:'-', val:3, label:'-3', color:C.gateBad },
    { type:'-', val:5, label:'-5', color:C.gateBad },
    { type:'-', val:8, label:'-8', color:C.gateBad },
  ];

  let stage = 1, best = loadBest();
  let player = { x: W / 2, army: 10 };
  let stickmen = [];
  let gates = [];     // {x, y, w, effect, used}  -- y in world coords
  let enemy = null;   // {x, y, hp, maxHp, w, h}
  let scrollY = 0;
  let lastSpawn = 0;
  let state = 'ready';
  let lastTs = 0;
  let rafId = null;

  function loadBest(){ try { return parseInt(localStorage.getItem('gmobctrl-best')||'1')||1; } catch(e){ return 1; } }
  function saveBest(v){ try { localStorage.setItem('gmobctrl-best', String(v)); } catch(e){} }

  // ===== Stage / level generation =====
  function genStage(n) {
    // Number of gate pairs and enemy HP scale with stage
    const pairs = 4 + Math.min(8, n);                 // 5..12 pairs
    const enemyHP = Math.round(25 + n * 18 + n*n*2);  // grows quadratic-ish
    gates = [];
    // First pair starts above screen so player has time
    const firstY = -120;
    const spacing = 160;
    // Effect pool widens / harder negatives at higher stage
    const pool = EFFECTS.filter(e => {
      if (n <= 1) return e.type !== '-' || e.val <= 3;
      if (n <= 3) return !(e.type === '-' && e.val > 5);
      return true;
    });
    const multBoost = n >= 4;
    for (let i = 0; i < pairs; i++) {
      const y = firstY - i * spacing;
      // Pick two distinct effects with at least one non-negative
      let a, b, tries = 0;
      do {
        a = pool[(Math.random() * pool.length) | 0];
        b = pool[(Math.random() * pool.length) | 0];
        tries++;
      } while (tries < 20 && (a === b || (a.type === '-' && b.type === '-')));
      const halfW = (W - GATE_GAP) / 2;
      gates.push({ x: 0, y, w: halfW, effect: a, used: false });
      gates.push({ x: halfW + GATE_GAP, y, w: halfW, effect: b, used: false });
    }
    enemy = {
      x: W / 2,
      y: firstY - pairs * spacing - 200,    // world Y; reaches screen after gates
      hp: enemyHP, maxHp: enemyHP,
      w: W - 40, h: ENEMY_H,
    };
  }

  function initStage(n) {
    player.army = 10;
    player.x = W / 2;
    stickmen = [];
    scrollY = 0;
    lastSpawn = 0;
    genStage(n);
    armyEl.textContent = 10;
    stageEl.textContent = n;
    bestEl.textContent = best;
  }

  function start() {
    overlay.classList.remove('show');
    state = 'playing';
    statusEl.textContent = '게이트로 군대를 키우세요';
    statusEl.className = 'status go';
    lastTs = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }
  function pause() {
    if (state !== 'playing') return;
    state = 'paused';
    pauseBtn.textContent = '재개';
    statusEl.textContent = '일시정지';
    statusEl.className = 'status';
    showOverlay('Paused', '일시정지', `현재 스테이지 <strong>${stage}</strong> · 군대 <strong>${player.army}</strong>`, '재개', resume, '');
  }
  function resume() {
    if (state !== 'paused') return;
    state = 'playing';
    pauseBtn.textContent = '일시정지';
    statusEl.textContent = '게이트로 군대를 키우세요';
    statusEl.className = 'status go';
    overlay.classList.remove('show');
    lastTs = performance.now();
  }
  function togglePause() { if (state === 'playing') pause(); else if (state === 'paused') resume(); }

  // ===== Loop =====
  function loop(ts) {
    const dt = Math.min(50, ts - lastTs);
    lastTs = ts;
    if (state === 'playing') update(ts, dt);
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function update(ts, dt) {
    const frameScale = dt / 16.67;
    scrollY += SCROLL_SPEED * frameScale;

    // Spawn stickmen
    if (ts - lastSpawn >= SPAWN_MS && player.army > 0) {
      stickmen.push({ x: player.x + (Math.random() * 6 - 3), y: SPAWNER_Y - 6, vy: -STICK_SPEED, alive: true });
      player.army--;
      armyEl.textContent = player.army;
      lastSpawn = ts;
    }

    // Update stickmen + collisions
    for (const s of stickmen) {
      if (!s.alive) continue;
      const prevY = s.y;
      s.y += s.vy * frameScale;
      // Gate collision
      for (const g of gates) {
        if (g.used) continue;
        const gy = g.y + scrollY;
        // bounding rect: gx..gx+w, gy..gy+GATE_H
        if (s.x >= g.x && s.x <= g.x + g.w && prevY > gy + GATE_H && s.y <= gy + GATE_H) {
          applyEffect(g.effect);
          g.used = true;
        }
      }
      // Enemy collision
      if (enemy && enemy.hp > 0) {
        const ey = enemy.y + scrollY;
        if (s.y <= ey + enemy.h && s.y >= ey - 4 && s.x >= enemy.x - enemy.w/2 && s.x <= enemy.x + enemy.w/2) {
          enemy.hp--;
          s.alive = false;
        }
      }
      // Off-screen top: dies
      if (s.y < -10) s.alive = false;
    }
    stickmen = stickmen.filter(s => s.alive);

    // Enemy defeated? (check first so a killing blow at the wire still counts as win)
    if (enemy && enemy.hp <= 0) return win();
    // Enemy reaches player?
    if (enemy && enemy.hp > 0) {
      const ey = enemy.y + scrollY;
      if (ey + enemy.h >= SPAWNER_Y - 10) return lose();
    }
    // Out of army with nothing flying and enemy alive => can't win, lose
    if (player.army === 0 && stickmen.length === 0 && enemy && enemy.hp > 0) return lose();
  }

  function applyEffect(e) {
    if (e.type === '+') player.army = Math.min(999, player.army + e.val);
    else if (e.type === '*') player.army = Math.min(999, player.army * e.val);
    else if (e.type === '-') player.army = Math.max(0, player.army - e.val);
    armyEl.textContent = player.army;
    if (navigator.vibrate && e.type !== '-') navigator.vibrate(15);
  }

  function win() {
    state = 'cleared';
    if (stage > best) { best = stage; saveBest(best); bestEl.textContent = best; }
    statusEl.textContent = `스테이지 ${stage} 클리어!`;
    statusEl.className = 'status win';
    setTimeout(() => showOverlay('Victory', `스테이지 ${stage} 클리어`, `남은 군대 <strong>${player.army}</strong>`, '다음 스테이지', nextStage, 'win'), 250);
  }
  function nextStage() {
    stage++;
    initStage(stage);
    start();
  }
  function lose() {
    state = 'over';
    statusEl.textContent = '패배';
    statusEl.className = 'status lose';
    if (navigator.vibrate) navigator.vibrate(80);
    setTimeout(() => showOverlay('Defeat', `스테이지 ${stage} 실패`, `최고 스테이지 <strong>${best}</strong>`, '다시 시작', restartFromOne, 'lose'), 200);
  }
  function restartFromOne() {
    stage = 1;
    initStage(1);
    start();
  }

  function showOverlay(eyebrow, title, body, btnText, btnFn, cls) {
    overlay.className = 'overlay show' + (cls ? ' ' + cls : '');
    ovEyebrow.textContent = eyebrow;
    ovTitle.textContent = title;
    ovStat.innerHTML = body;
    ovBtn.textContent = btnText;
    ovBtn.onclick = btnFn;
  }

  // ===== Drawing =====
  function draw() {
    ctx.fillStyle = C.field;
    ctx.fillRect(0, 0, W, H);

    // subtle vertical track guides
    ctx.fillStyle = C.track;
    ctx.fillRect(W/2 - 0.5, 0, 1, H);

    // Gates
    for (const g of gates) {
      const y = g.y + scrollY;
      if (y > H || y + GATE_H < 0) continue;
      const used = g.used;
      ctx.fillStyle = used ? '#9C8B6E' : g.effect.color;
      ctx.globalAlpha = used ? 0.35 : 1;
      ctx.fillRect(g.x, y, g.w, GATE_H);
      // label
      ctx.globalAlpha = 1;
      ctx.fillStyle = used ? '#5C4F35' : '#FBF8F2';
      ctx.font = 'bold 22px "EB Garamond", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(g.effect.label, g.x + g.w / 2, y + GATE_H / 2);
    }

    // Enemy
    if (enemy && enemy.hp > 0) {
      const y = enemy.y + scrollY;
      if (y + enemy.h > 0 && y < H) {
        ctx.fillStyle = C.enemy;
        ctx.fillRect(enemy.x - enemy.w/2, y, enemy.w, enemy.h);
        ctx.fillStyle = C.enemyDark;
        ctx.fillRect(enemy.x - enemy.w/2, y, enemy.w, 4);
        ctx.fillRect(enemy.x - enemy.w/2, y + enemy.h - 4, enemy.w, 4);
        // HP text
        ctx.fillStyle = '#FBF8F2';
        ctx.font = 'bold 26px "EB Garamond", serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(enemy.hp + ' / ' + enemy.maxHp, enemy.x, y + enemy.h/2);
      }
    }

    // Stickmen
    ctx.fillStyle = C.stickman;
    for (const s of stickmen) {
      if (!s.alive) continue;
      ctx.beginPath();
      ctx.arc(s.x, s.y, STICK_R, 0, Math.PI * 2);
      ctx.fill();
    }

    // Spawner
    ctx.fillStyle = C.spawner;
    ctx.fillRect(player.x - SPAWNER_W/2, SPAWNER_Y - 8, SPAWNER_W, SPAWNER_H);
    ctx.fillStyle = C.spawnerEdge;
    ctx.fillRect(player.x - SPAWNER_W/2, SPAWNER_Y - 8, SPAWNER_W, 4);
    ctx.fillRect(player.x - 4, SPAWNER_Y - 14, 8, 8);
    // Army count over spawner
    ctx.fillStyle = '#FBF8F2';
    ctx.font = 'bold 16px "EB Garamond", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(player.army, player.x, SPAWNER_Y + SPAWNER_H/2 - 4);
  }

  // ===== Input =====
  let dragging = false;
  function ptX(e) {
    const t = e.touches ? e.touches[0] : e;
    const rect = boardWrap.getBoundingClientRect();
    return ((t.clientX - rect.left) / rect.width) * W;
  }
  function dragStart(e) { if (state !== 'playing') return; dragging = true; player.x = clampX(ptX(e)); if (e.cancelable) e.preventDefault(); }
  function dragMove(e) { if (!dragging || state !== 'playing') return; player.x = clampX(ptX(e)); if (e.cancelable) e.preventDefault(); }
  function dragEnd() { dragging = false; }
  function clampX(x) { return Math.max(SPAWNER_W/2, Math.min(W - SPAWNER_W/2, x)); }

  boardWrap.addEventListener('touchstart', dragStart, { passive: false });
  boardWrap.addEventListener('touchmove', dragMove, { passive: false });
  boardWrap.addEventListener('touchend', dragEnd);
  boardWrap.addEventListener('touchcancel', dragEnd);
  boardWrap.addEventListener('mousedown', dragStart);
  window.addEventListener('mousemove', dragMove);
  window.addEventListener('mouseup', dragEnd);

  let keyLeft = false, keyRight = false;
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { keyLeft = true; e.preventDefault(); }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { keyRight = true; e.preventDefault(); }
    if (e.key === 'p' || e.key === 'P') { togglePause(); e.preventDefault(); }
    if ((e.key === ' ' || e.key === 'Enter') && state === 'ready') { e.preventDefault(); start(); }
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keyLeft = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keyRight = false;
  });
  // Keyboard movement integration (lightweight)
  setInterval(() => {
    if (state !== 'playing') return;
    if (keyLeft) player.x = clampX(player.x - 6);
    if (keyRight) player.x = clampX(player.x + 6);
  }, 16);

  // ===== Buttons =====
  ovBtn.onclick = () => { initStage(stage); start(); };
  newGameBtn.addEventListener('click', () => { stage = 1; initStage(1); start(); });
  pauseBtn.addEventListener('click', () => { if (state === 'ready') start(); else togglePause(); });

  // ===== Boot =====
  initStage(1);
  bestEl.textContent = best;
  draw();
  resizeCanvas();
  setTimeout(resizeCanvas, 100);
</script>
</body>
</html>
