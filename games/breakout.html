<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Breakout · 벽돌깨기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F1EA;
    --bg-elev: #FBF8F2;
    --ink: #1B365D;
    --ink-mid: #2D456C;
    --ink-soft: #5A6B82;
    --line: #D4CCBC;
    --gold: #B8935A;
    --gold-deep: #A07C44;
    --gold-soft: #D9B98A;
    --gold-pale: #EBDEBA;
    --danger: #B85A4A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "EB Garamond", "Noto Serif KR", Georgia, serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(184, 147, 90, 0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(27, 54, 93, 0.05), transparent 40%);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .frame { width: 100%; max-width: 400px; }

  .header { text-align: center; margin-bottom: 22px; }
  .eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .title {
    font-family: "EB Garamond", serif;
    font-style: italic;
    font-weight: 500;
    font-size: 2.4rem;
    line-height: 1;
  }
  .title::after {
    content: "";
    display: block;
    width: 32px;
    height: 1px;
    background: var(--gold);
    margin: 14px auto 0;
  }

  .scores {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    margin-bottom: 14px;
  }
  .score-cell {
    background: var(--bg-elev);
    padding: 9px 4px;
    text-align: center;
  }
  .score-label {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 2px;
  }
  .score-value {
    font-family: "EB Garamond", serif;
    font-size: 1.2rem;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .score-cell.best .score-value { color: var(--gold); font-style: italic; }
  .lives {
    display: inline-flex;
    gap: 4px;
    justify-content: center;
    align-items: center;
    height: 22px;
  }
  .life-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .life-dot.lost { background: var(--line); opacity: 0.4; transform: scale(0.7); }

  .status {
    text-align: center;
    font-size: 0.88rem;
    font-style: italic;
    color: var(--ink-soft);
    min-height: 22px;
    margin-bottom: 12px;
    letter-spacing: 0.02em;
  }
  .status.go { color: var(--gold); font-style: normal; letter-spacing: 0.08em; }
  .status.danger { color: var(--danger); font-style: normal; }

  .board-wrap {
    position: relative;
    aspect-ratio: 360 / 480;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    margin-bottom: 14px;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
  }
  canvas { display: block; width: 100%; height: 100%; }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(245, 241, 234, 0.9);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 5;
    animation: fadeIn 0.3s ease;
  }
  .overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .overlay-card {
    background: var(--bg-elev);
    border: 1px solid var(--gold);
    padding: 22px 18px;
    text-align: center;
    max-width: 260px;
    width: 100%;
    position: relative;
  }
  .overlay-card::before, .overlay-card::after {
    content: "";
    position: absolute;
    width: 16px; height: 16px;
    border: 1px solid var(--gold);
  }
  .overlay-card::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .overlay-card::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
  .overlay-eyebrow {
    font-size: 0.62rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 7px;
  }
  .overlay-title {
    font-family: "EB Garamond", serif;
    font-style: italic;
    font-size: 1.5rem;
    color: var(--gold);
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .overlay.gameover .overlay-title { color: var(--ink); font-style: normal; }
  .overlay.clear .overlay-title { color: var(--gold); }
  .overlay-stat {
    font-size: 0.82rem;
    color: var(--ink-soft);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .overlay-stat strong {
    font-family: "EB Garamond", serif;
    font-weight: 500;
    color: var(--ink);
    font-size: 1.05rem;
  }
  .overlay-btn {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--bg-elev);
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s ease;
  }
  .overlay-btn:hover { background: var(--gold); border-color: var(--gold); }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .btn {
    padding: 12px;
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    font-family: inherit;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn:hover, .btn:active {
    background: var(--ink);
    color: var(--bg-elev);
  }
  .btn.subtle {
    border-color: var(--line);
    color: var(--ink-soft);
  }
  .btn.subtle:hover {
    background: var(--ink-soft);
    color: var(--bg-elev);
  }

  .hint {
    text-align: center;
    font-size: 0.72rem;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    line-height: 1.6;
  }
  .kbd {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    font-family: "EB Garamond", serif;
    font-size: 0.75rem;
    margin: 0 1px;
  }

  .footer {
    text-align: center;
    margin-top: 18px;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="frame">
    <header class="header">
      <div class="eyebrow">Game · No. 05</div>
      <h1 class="title">Breakout</h1>
    </header>

    <div class="scores">
      <div class="score-cell">
        <div class="score-label">Score</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-cell">
        <div class="score-label">Lvl</div>
        <div class="score-value" id="level">1</div>
      </div>
      <div class="score-cell">
        <div class="score-label">Lives</div>
        <div class="lives" id="lives"></div>
      </div>
      <div class="score-cell best">
        <div class="score-label">Best</div>
        <div class="score-value" id="best">0</div>
      </div>
    </div>

    <div class="status" id="status">패들을 움직여 공을 발사하세요</div>

    <div class="board-wrap" id="boardWrap">
      <canvas id="canvas"></canvas>
      <div class="overlay show" id="overlay">
        <div class="overlay-card">
          <div class="overlay-eyebrow" id="overlayEyebrow">Ready</div>
          <div class="overlay-title" id="overlayTitle">시작 준비</div>
          <div class="overlay-stat" id="overlayStat">
            화면을 탭하거나 <span class="kbd">Space</span>를 누르면<br>공이 발사됩니다
          </div>
          <button class="overlay-btn" id="overlayBtn">시작</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="newGame">새 게임</button>
      <button class="btn subtle" id="pauseBtn">일시정지</button>
    </div>

    <div class="hint">
      방향키 <span class="kbd">←</span><span class="kbd">→</span> · 마우스 · 화면 드래그 · 발사 <span class="kbd">Space</span>
    </div>

    <div class="footer">— Min1 Park · 2026 —</div>
  </div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const levelEl = document.getElementById('level');
  const livesEl = document.getElementById('lives');
  const bestEl = document.getElementById('best');
  const statusEl = document.getElementById('status');
  const overlay = document.getElementById('overlay');
  const overlayEyebrow = document.getElementById('overlayEyebrow');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayStat = document.getElementById('overlayStat');
  const overlayBtn = document.getElementById('overlayBtn');
  const newGameBtn = document.getElementById('newGame');
  const pauseBtn = document.getElementById('pauseBtn');
  const boardWrap = document.getElementById('boardWrap');

  // Virtual coordinate system — game logic runs in this space, canvas scales
  const VW = 360, VH = 480;
  let dpr = window.devicePixelRatio || 1;

  const styles = getComputedStyle(document.documentElement);
  const COL = {
    bg: styles.getPropertyValue('--bg-elev').trim(),
    line: styles.getPropertyValue('--line').trim(),
    ink: styles.getPropertyValue('--ink').trim(),
    inkMid: styles.getPropertyValue('--ink-mid').trim(),
    inkSoft: styles.getPropertyValue('--ink-soft').trim(),
    gold: styles.getPropertyValue('--gold').trim(),
    goldDeep: styles.getPropertyValue('--gold-deep').trim(),
    goldSoft: styles.getPropertyValue('--gold-soft').trim(),
    goldPale: styles.getPropertyValue('--gold-pale').trim(),
    danger: styles.getPropertyValue('--danger').trim(),
  };

  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;
    const rect = boardWrap.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const scale = rect.width / VW;
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
  }
  window.addEventListener('resize', resizeCanvas);

  // === Game constants ===
  const BRICK_ROWS = 5;
  const BRICK_COLS = 6;
  const BRICK_MARGIN_X = 12;
  const BRICK_GAP = 3;
  const BRICK_W = (VW - 2 * BRICK_MARGIN_X - (BRICK_COLS - 1) * BRICK_GAP) / BRICK_COLS;
  const BRICK_H = 16;
  const BRICK_TOP = 36;

  const PADDLE_W = 64;
  const PADDLE_H = 8;
  const PADDLE_Y = VH - 30;

  const BALL_R = 5;
  const BASE_SPEED = 3.6;

  // Brick tiers — top row is hardest/highest scoring
  const BRICK_TIERS = [
    { fill: COL.ink,      stroke: '#0F1F37', points: 50, accent: COL.gold },
    { fill: COL.inkMid,   stroke: COL.ink,   points: 40, accent: COL.gold },
    { fill: COL.goldDeep, stroke: '#876530', points: 30, accent: COL.bg },
    { fill: COL.gold,     stroke: COL.goldDeep, points: 20, accent: COL.bg },
    { fill: COL.goldSoft, stroke: COL.gold,  points: 10, accent: COL.ink },
  ];

  // === State ===
  let paddle = { x: VW / 2, y: PADDLE_Y, w: PADDLE_W, h: PADDLE_H };
  let ball = { x: 0, y: 0, vx: 0, vy: 0, stuck: true };
  let bricks = []; // {x, y, w, h, tier, alive, fade}
  let trail = []; // recent ball positions

  let score = 0;
  let best = 0;
  let level = 1;
  let lives = 3;
  let running = false;
  let started = false;
  let gameOver = false;
  let cleared = false;
  let lastTs = 0;
  let speedMult = 1; // increases with level
  let rafId = null;

  function loadBest() {
    try { return parseInt(localStorage.getItem('gbreakout-best') || '0') || 0; }
    catch (e) { return 0; }
  }
  function saveBest(v) {
    try { localStorage.setItem('gbreakout-best', String(v)); } catch (e) {}
  }

  function renderLives() {
    livesEl.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const d = document.createElement('div');
      d.className = 'life-dot' + (i >= lives ? ' lost' : '');
      livesEl.appendChild(d);
    }
  }

  function buildBricks() {
    bricks = [];
    for (let r = 0; r < BRICK_ROWS; r++) {
      for (let c = 0; c < BRICK_COLS; c++) {
        bricks.push({
          x: BRICK_MARGIN_X + c * (BRICK_W + BRICK_GAP),
          y: BRICK_TOP + r * (BRICK_H + BRICK_GAP),
          w: BRICK_W,
          h: BRICK_H,
          tier: r, // 0 = top
          alive: true,
          fade: 0,
        });
      }
    }
  }

  function resetBall() {
    ball.x = paddle.x;
    ball.y = paddle.y - BALL_R - 1;
    ball.vx = 0;
    ball.vy = 0;
    ball.stuck = true;
    trail = [];
  }

  function launchBall() {
    if (!ball.stuck) return;
    if (gameOver || cleared) return;
    const angle = (Math.random() * 0.4 - 0.2) - Math.PI / 2; // mostly straight up, slight randomness
    const speed = BASE_SPEED * speedMult;
    ball.vx = Math.cos(angle) * speed;
    ball.vy = Math.sin(angle) * speed;
    ball.stuck = false;
    if (!started) {
      started = true;
      running = true;
      hideOverlay();
      statusEl.textContent = '진행 중';
      statusEl.className = 'status go';
    }
  }

  function init() {
    score = 0;
    level = 1;
    lives = 3;
    speedMult = 1;
    running = false;
    started = false;
    gameOver = false;
    cleared = false;
    paddle.x = VW / 2;
    best = loadBest();
    bestEl.textContent = best;
    scoreEl.textContent = 0;
    levelEl.textContent = 1;
    renderLives();
    buildBricks();
    resetBall();
    statusEl.textContent = '패들을 움직여 공을 발사하세요';
    statusEl.className = 'status';
    pauseBtn.textContent = '일시정지';
    showStartOverlay();
    if (rafId) cancelAnimationFrame(rafId);
    lastTs = performance.now();
    rafId = requestAnimationFrame(loop);
  }

  function nextLevel() {
    level++;
    speedMult = Math.min(1.8, 1 + (level - 1) * 0.12);
    levelEl.textContent = level;
    cleared = false;
    running = false;
    buildBricks();
    resetBall();
    statusEl.textContent = `Level ${level} 시작`;
    statusEl.className = 'status go';
    showLevelOverlay();
  }

  function loseLife() {
    lives--;
    renderLives();
    running = false;
    if (lives <= 0) return endGame();
    resetBall();
    statusEl.textContent = `남은 목숨 ${lives}`;
    statusEl.className = 'status danger';
    setTimeout(() => {
      if (!running && !gameOver) running = true;
    }, 700);
  }

  function endGame() {
    gameOver = true;
    running = false;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      saveBest(best);
    }
    statusEl.textContent = '게임 오버';
    statusEl.className = 'status danger';
    setTimeout(() => showGameOverOverlay(), 500);
  }

  function checkClear() {
    if (bricks.every(b => !b.alive)) {
      cleared = true;
      running = false;
      setTimeout(() => nextLevel(), 600);
    }
  }

  // === Physics ===
  function step(dt) {
    if (ball.stuck) {
      ball.x = paddle.x;
      ball.y = paddle.y - BALL_R - 1;
      return;
    }

    // Move in small substeps to avoid tunneling through bricks at high speed
    const steps = 2;
    for (let i = 0; i < steps; i++) {
      const sx = ball.vx / steps;
      const sy = ball.vy / steps;
      const prevX = ball.x, prevY = ball.y;
      ball.x += sx;
      ball.y += sy;

      // Wall collisions
      if (ball.x - BALL_R < 0) {
        ball.x = BALL_R; ball.vx = Math.abs(ball.vx);
      } else if (ball.x + BALL_R > VW) {
        ball.x = VW - BALL_R; ball.vx = -Math.abs(ball.vx);
      }
      if (ball.y - BALL_R < 0) {
        ball.y = BALL_R; ball.vy = Math.abs(ball.vy);
      }

      // Floor — lose life
      if (ball.y - BALL_R > VH) {
        return loseLife();
      }

      // Paddle
      if (ball.vy > 0 &&
          ball.y + BALL_R >= paddle.y - paddle.h / 2 &&
          ball.y - BALL_R <= paddle.y + paddle.h / 2 &&
          ball.x >= paddle.x - paddle.w / 2 - BALL_R &&
          ball.x <= paddle.x + paddle.w / 2 + BALL_R) {
        // Reflect with angle based on hit position
        const hitRel = (ball.x - paddle.x) / (paddle.w / 2); // -1 to 1
        const clamped = Math.max(-1, Math.min(1, hitRel));
        const angle = clamped * (Math.PI * 0.34); // up to ~61 degrees
        const speed = Math.hypot(ball.vx, ball.vy);
        ball.vx = speed * Math.sin(angle);
        ball.vy = -Math.abs(speed * Math.cos(angle));
        ball.y = paddle.y - paddle.h / 2 - BALL_R - 0.1;
      }

      // Bricks
      for (let bi = 0; bi < bricks.length; bi++) {
        const b = bricks[bi];
        if (!b.alive) continue;
        if (ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + b.w &&
            ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + b.h) {
          // Determine collision face based on previous position
          const wasLeft = prevX + BALL_R <= b.x;
          const wasRight = prevX - BALL_R >= b.x + b.w;
          const wasAbove = prevY + BALL_R <= b.y;
          const wasBelow = prevY - BALL_R >= b.y + b.h;
          if (wasLeft || wasRight) ball.vx = -ball.vx;
          else if (wasAbove || wasBelow) ball.vy = -ball.vy;
          else ball.vy = -ball.vy; // fallback (corner)

          b.alive = false;
          b.fade = 1;
          score += BRICK_TIERS[b.tier].points;
          scoreEl.textContent = score;
          if (score > best) {
            best = score; bestEl.textContent = best; saveBest(best);
          }
          checkClear();
          break; // only one brick per substep
        }
      }
    }

    // Trail
    trail.push({ x: ball.x, y: ball.y });
    if (trail.length > 6) trail.shift();
  }

  // === Rendering ===
  function roundRect(x, y, w, h, r) {
    if (r > w / 2) r = w / 2;
    if (r > h / 2) r = h / 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function draw() {
    ctx.fillStyle = COL.bg;
    ctx.fillRect(0, 0, VW, VH);

    // Side accent borders
    ctx.fillStyle = COL.line;
    ctx.globalAlpha = 0.5;
    ctx.fillRect(0, 0, VW, 1);
    ctx.globalAlpha = 1;

    // Bricks
    for (const b of bricks) {
      const tier = BRICK_TIERS[b.tier];
      if (b.alive) {
        ctx.fillStyle = tier.fill;
        roundRect(b.x, b.y, b.w, b.h, 2);
        ctx.fill();
        // Subtle top highlight
        ctx.fillStyle = tier.accent;
        ctx.globalAlpha = 0.18;
        ctx.fillRect(b.x + 1.5, b.y + 1.5, b.w - 3, 1);
        ctx.globalAlpha = 1;
        // Border
        ctx.strokeStyle = tier.stroke;
        ctx.lineWidth = 0.5;
        roundRect(b.x, b.y, b.w, b.h, 2);
        ctx.stroke();
      } else if (b.fade > 0) {
        ctx.globalAlpha = b.fade;
        ctx.fillStyle = tier.fill;
        const expand = (1 - b.fade) * 3;
        roundRect(b.x - expand, b.y - expand, b.w + expand * 2, b.h + expand * 2, 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        b.fade -= 0.08;
      }
    }

    // Ball trail
    trail.forEach((t, i) => {
      const a = (i + 1) / (trail.length + 1) * 0.5;
      ctx.fillStyle = COL.gold;
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(t.x, t.y, BALL_R * (i / trail.length) + 1.5, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Ball
    ctx.fillStyle = COL.gold;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();
    // Ball highlight
    ctx.fillStyle = COL.goldPale;
    ctx.beginPath();
    ctx.arc(ball.x - 1.2, ball.y - 1.2, BALL_R * 0.4, 0, Math.PI * 2);
    ctx.fill();

    // Paddle
    ctx.fillStyle = COL.ink;
    roundRect(paddle.x - paddle.w / 2, paddle.y - paddle.h / 2, paddle.w, paddle.h, paddle.h / 2);
    ctx.fill();
    // Paddle gold stripe
    ctx.fillStyle = COL.gold;
    ctx.fillRect(paddle.x - paddle.w / 2 + 6, paddle.y - 0.5, paddle.w - 12, 1);
  }

  function loop(ts) {
    const dt = Math.min(50, ts - lastTs);
    lastTs = ts;
    if (running) step(dt);
    draw();
    rafId = requestAnimationFrame(loop);
  }

  // === Overlays ===
  function showStartOverlay() {
    overlay.className = 'overlay show';
    overlayEyebrow.textContent = 'Ready';
    overlayTitle.textContent = '시작 준비';
    overlayStat.innerHTML = '화면을 탭하거나 <span class="kbd">Space</span>를 누르면<br>공이 발사됩니다';
    overlayBtn.textContent = '시작';
    overlayBtn.onclick = () => { hideOverlay(); started = false; launchBall(); };
  }
  function showLevelOverlay() {
    overlay.className = 'overlay clear show';
    overlayEyebrow.textContent = `Level ${level - 1} Cleared`;
    overlayTitle.textContent = `Level ${level} 진입`;
    overlayStat.innerHTML = `Score · <strong>${score}</strong><br><span style="color:var(--gold);">속도가 빨라졌습니다</span>`;
    overlayBtn.textContent = '계속';
    overlayBtn.onclick = () => {
      hideOverlay();
      running = true;
      launchBall();
    };
  }
  function showPauseOverlay() {
    overlay.className = 'overlay show';
    overlayEyebrow.textContent = 'Paused';
    overlayTitle.textContent = '일시정지';
    overlayStat.innerHTML = `Score · <strong>${score}</strong>`;
    overlayBtn.textContent = '재개';
    overlayBtn.onclick = () => resume();
  }
  function showGameOverOverlay() {
    overlay.className = 'overlay gameover show';
    overlayEyebrow.textContent = 'Game Over';
    overlayTitle.textContent = '게임 오버';
    const isRecord = score > 0 && score === best;
    overlayStat.innerHTML = `Score · <strong>${score}</strong> · Level <strong>${level}</strong>` +
      (isRecord ? '<br><span style="color:var(--gold);font-style:italic;">최고 점수 갱신</span>' : '');
    overlayBtn.textContent = '다시 시작';
    overlayBtn.onclick = () => init();
  }
  function hideOverlay() { overlay.classList.remove('show'); }

  // === Pause ===
  function pause() {
    if (!started || gameOver || cleared) return;
    if (!running) return;
    running = false;
    pauseBtn.textContent = '재개';
    statusEl.textContent = '일시정지';
    statusEl.className = 'status';
    showPauseOverlay();
  }
  function resume() {
    if (gameOver || cleared) return;
    running = true;
    pauseBtn.textContent = '일시정지';
    statusEl.textContent = '진행 중';
    statusEl.className = 'status go';
    hideOverlay();
  }
  function togglePause() {
    if (running) pause(); else if (started && !gameOver) resume();
  }

  // === Input ===
  // Paddle move via mouse / touch
  function setPaddleFromClientX(clientX) {
    const rect = boardWrap.getBoundingClientRect();
    const x = (clientX - rect.left) / rect.width * VW;
    paddle.x = Math.max(paddle.w / 2, Math.min(VW - paddle.w / 2, x));
  }

  boardWrap.addEventListener('mousemove', (e) => setPaddleFromClientX(e.clientX));
  boardWrap.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
      e.preventDefault();
      setPaddleFromClientX(e.touches[0].clientX);
    }
  }, { passive: false });
  boardWrap.addEventListener('touchstart', (e) => {
    if (e.touches.length > 0) {
      setPaddleFromClientX(e.touches[0].clientX);
      // Tap to launch
      if (ball.stuck) launchBall();
    }
  }, { passive: true });
  boardWrap.addEventListener('click', () => {
    if (ball.stuck && !gameOver && !cleared) launchBall();
    document.body.focus();
  });

  // Keyboard
  const keys = { left: false, right: false };
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
      keys.left = true; e.preventDefault();
    } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
      keys.right = true; e.preventDefault();
    } else if (e.key === ' ') {
      e.preventDefault();
      if (ball.stuck && !gameOver && !cleared) launchBall();
      else togglePause();
    } else if (e.key === 'r' || e.key === 'R') {
      init();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
  });

  // Keyboard paddle move loop
  setInterval(() => {
    if (keys.left) paddle.x = Math.max(paddle.w / 2, paddle.x - 5);
    if (keys.right) paddle.x = Math.min(VW - paddle.w / 2, paddle.x + 5);
  }, 16);

  // Buttons
  newGameBtn.addEventListener('click', () => init());
  pauseBtn.addEventListener('click', () => {
    if (!started) {
      hideOverlay();
      launchBall();
    } else {
      togglePause();
    }
  });

  // Focus body for keyboard in iframe
  document.body.tabIndex = -1;

  // Boot
  resizeCanvas();
  init();
</script>
</body>
</html>
