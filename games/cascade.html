<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cascade · 캐스케이드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F1EA; --bg-elev: #FBF8F2; --ink: #1B365D; --ink-soft: #5A6B82;
    --line: #D4CCBC; --gold: #B8935A; --gold-deep: #8A6A38;
    --good: #2C7A4D; --bad: #C0392B; --mult: #B8935A;
    --field: #F0E6D0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "EB Garamond", "Noto Serif KR", Georgia, serif;
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 10%, rgba(184,147,90,0.06), transparent 40%), radial-gradient(circle at 80% 90%, rgba(27,54,93,0.05), transparent 40%);
    color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 18px 12px; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .frame { width: 100%; max-width: 400px; }
  .header { text-align: center; margin-bottom: 12px; }
  .eyebrow { font-size: 0.7rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; }
  .title { font-family: "EB Garamond", serif; font-style: italic; font-weight: 500; font-size: 2.2rem; line-height: 1; }
  .title::after { content: ""; display: block; width: 32px; height: 1px; background: var(--gold); margin: 12px auto 0; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); margin-bottom: 8px; }
  .stat-cell { background: var(--bg-elev); padding: 8px 3px; text-align: center; }
  .stat-label { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 2px; }
  .stat-value { font-family: "EB Garamond", serif; font-size: 1.05rem; font-weight: 500; font-variant-numeric: tabular-nums; }
  .stat-cell.best .stat-value { color: var(--gold); font-style: italic; }
  .stat-cell.army .stat-value { color: var(--ink); }
  .stat-cell.hp .stat-value { color: var(--bad); }
  .stat-cell.time .stat-value { color: var(--gold-deep); }

  .status { text-align: center; font-size: 0.88rem; font-style: italic; color: var(--ink-soft); min-height: 22px; margin: 6px 0; letter-spacing: 0.02em; }
  .status.go { color: var(--gold); font-style: normal; letter-spacing: 0.06em; }
  .status.win { color: var(--good); font-style: normal; font-weight: 500; letter-spacing: 0.1em; }
  .status.lose { color: var(--bad); font-style: normal; font-weight: 500; letter-spacing: 0.1em; }

  .board-wrap { position: relative; aspect-ratio: 3 / 5; background: var(--field); border: 1px solid var(--ink); box-shadow: 0 6px 18px rgba(60,40,20,0.18); margin-bottom: 12px; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; cursor: pointer; }
  canvas { display: block; width: 100%; height: 100%; }

  .overlay { position: absolute; inset: 0; background: rgba(27,54,93,0.82); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); display: none; align-items: center; justify-content: center; padding: 18px; z-index: 5; animation: fadeIn 0.3s ease; }
  .overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .overlay-card { background: var(--bg-elev); border: 1px solid var(--gold); padding: 22px 18px; text-align: center; max-width: 300px; width: 100%; position: relative; }
  .overlay-card::before, .overlay-card::after { content: ""; position: absolute; width: 16px; height: 16px; border: 1px solid var(--gold); }
  .overlay-card::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .overlay-card::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
  .overlay-eyebrow { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 7px; }
  .overlay-title { font-family: "EB Garamond", serif; font-style: italic; font-size: 1.45rem; color: var(--gold); margin-bottom: 12px; line-height: 1.2; }
  .overlay.lose .overlay-title { color: var(--bad); font-style: normal; }
  .overlay.win .overlay-title { color: var(--good); font-style: normal; }
  .overlay-stat { font-size: 0.85rem; color: var(--ink-soft); margin-bottom: 14px; line-height: 1.6; }
  .overlay-stat strong { font-family: "EB Garamond", serif; font-weight: 500; color: var(--ink); font-size: 1.05rem; }
  .overlay-btn { width: 100%; padding: 11px; border: 1px solid var(--ink); background: var(--ink); color: var(--bg-elev); font-family: inherit; font-size: 0.82rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; }
  .overlay-btn:hover { background: var(--gold); border-color: var(--gold); }

  .controls-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .btn { padding: 11px; background: transparent; border: 1px solid var(--ink); color: var(--ink); font-family: inherit; font-size: 0.82rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease; }
  .btn:hover, .btn:active { background: var(--ink); color: var(--bg-elev); }
  .btn.subtle { border-color: var(--line); color: var(--ink-soft); }
  .btn.subtle:hover { background: var(--ink-soft); color: var(--bg-elev); }
  .hint { text-align: center; font-size: 0.7rem; color: var(--ink-soft); letter-spacing: 0.04em; line-height: 1.6; }
  .footer { text-align: center; margin-top: 14px; font-size: 0.7rem; letter-spacing: 0.15em; color: var(--ink-soft); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="frame">
    <header class="header">
      <div class="eyebrow">Game · No. 15</div>
      <h1 class="title">Cascade</h1>
    </header>

    <div class="stats">
      <div class="stat-cell"><div class="stat-label">Stage</div><div class="stat-value" id="stageEl">1</div></div>
      <div class="stat-cell army"><div class="stat-label">군대</div><div class="stat-value" id="armyEl">0</div></div>
      <div class="stat-cell hp"><div class="stat-label">적 HP</div><div class="stat-value" id="hpEl">0</div></div>
      <div class="stat-cell time"><div class="stat-label">시간</div><div class="stat-value" id="timeEl">60</div></div>
    </div>

    <div class="status" id="status">시작 버튼을 누르세요</div>

    <div class="board-wrap" id="boardWrap">
      <canvas id="canvas"></canvas>
      <div class="overlay show" id="overlay">
        <div class="overlay-card">
          <div class="overlay-eyebrow" id="ovEyebrow">Ready</div>
          <div class="overlay-title" id="ovTitle">캐스케이드</div>
          <div class="overlay-stat" id="ovStat">화면을 좌우로 드래그해 대포를 움직이세요.<br>
            대포에서 군인이 자동으로 발사됩니다.<br>
            <strong style="color:var(--mult)">×2 · ×3</strong> 게이트로 군대를 폭발적으로 늘려<br>
            끝의 빨간 기지를 60초 안에 격파하세요!</div>
          <button class="overlay-btn" id="ovBtn">시작</button>
        </div>
      </div>
    </div>

    <div class="controls-meta">
      <button class="btn" id="newGameBtn">새 게임</button>
      <button class="btn subtle" id="pauseBtn">일시정지</button>
    </div>
    <div class="hint">화면을 좌우로 드래그 (PC는 ←→ 키) · 좋은 게이트로 조준 · 적 군대와 부딪히면 양쪽 모두 소멸</div>
    <div class="footer">— Min1 Park · 2026 —</div>
  </div>

<script>
  // ===== Refs =====
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const boardWrap = document.getElementById('boardWrap');
  const stageEl = document.getElementById('stageEl');
  const armyEl = document.getElementById('armyEl');
  const hpEl = document.getElementById('hpEl');
  const timeEl = document.getElementById('timeEl');
  const statusEl = document.getElementById('status');
  const overlay = document.getElementById('overlay');
  const ovEyebrow = document.getElementById('ovEyebrow');
  const ovTitle = document.getElementById('ovTitle');
  const ovStat = document.getElementById('ovStat');
  const ovBtn = document.getElementById('ovBtn');
  const newGameBtn = document.getElementById('newGameBtn');
  const pauseBtn = document.getElementById('pauseBtn');

  // ===== Config =====
  const W = 360, H = 600;
  const SPAWNER_Y = 552;
  const ENEMY_Y = 30, ENEMY_H = 56;
  const BLUE_SPEED = 5.5;
  const RED_SPEED = 4.0;
  const BLUE_SPAWN_MS = 55;
  const STICK_R = 3.2;
  const MAX_STICK = 260;
  const TIME_LIMIT = 60;          // seconds
  const GATE_ROWS_Y = [180, 290, 400];
  const LANES = 3;
  const LANE_W = (W - 6) / LANES; // 6px gaps total
  const CLASH_DIST = 9;

  // ===== Colors =====
  const COL = {
    field: '#F0E6D0', fieldDark: '#E0D2B0',
    bg: '#F5F1EA',
    spawner: '#1B365D', spawnerEdge: '#0C1F3D',
    blue: '#1B365D', blueLight: '#3D5A85',
    red: '#C0392B', redDark: '#8A2A1F',
    enemy: '#7C2418', enemyEdge: '#4A0F08',
    good: '#2C7A4D', bad: '#C0392B', mult: '#B8935A',
    text: '#FBF8F2', ink: '#1B365D',
    line: 'rgba(120,100,70,0.10)',
  };

  // ===== State =====
  let stage = 1;
  let best = loadBest();
  let player = { x: W / 2 };
  let blues = [];
  let reds = [];
  let gates = [];   // {x, y, w, h, effect, deactivated}
  let particles = [];
  let enemy = { hp: 0, maxHp: 0, redSpawnMs: 200, redLastSpawn: 0 };
  let stageStartMs = 0;
  let state = 'ready';
  let lastTs = 0, lastBlueSpawn = 0;
  let rafId = null;

  function loadBest(){ try { return parseInt(localStorage.getItem('gcascade-best')||'1')||1; } catch(e){ return 1; } }
  function saveBest(v){ try { localStorage.setItem('gcascade-best', String(v)); } catch(e){} }

  // ===== Canvas sizing =====
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = boardWrap.getBoundingClientRect();
    if (rect.width < 1) return;
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    const scale = rect.width / W;
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
  }
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('load', resizeCanvas);

  // ===== Stage / gate generation =====
  function pickEffects(n, count) {
    // Pool changes with stage difficulty
    const pool = [
      { type:'*', val:2, label:'×2', color: COL.mult, weight: 4 },
      { type:'*', val:3, label:'×3', color: COL.mult, weight: n >= 2 ? 2 : 0 },
      { type:'+', val:10, label:'+10', color: COL.good, weight: 3 },
      { type:'+', val:20, label:'+20', color: COL.good, weight: 3 },
      { type:'+', val:30, label:'+30', color: COL.good, weight: n >= 2 ? 2 : 1 },
      { type:'-', val:10, label:'-10', color: COL.bad, weight: n >= 1 ? 2 : 0 },
      { type:'-', val:25, label:'-25', color: COL.bad, weight: n >= 3 ? 2 : 0 },
      { type:'/', val:2, label:'÷2', color: COL.bad, weight: n >= 4 ? 1 : 0 },
    ];
    function pickOne() {
      const valid = pool.filter(p => p.weight > 0);
      const total = valid.reduce((s, p) => s + p.weight, 0);
      let r = Math.random() * total;
      for (const p of valid) { r -= p.weight; if (r <= 0) return p; }
      return valid[valid.length - 1];
    }
    const picked = [];
    let tries = 0;
    while (picked.length < count && tries < 50) {
      tries++;
      const e = pickOne();
      // Avoid two identical effects in same row
      if (picked.some(p => p.label === e.label)) continue;
      picked.push(e);
    }
    // ensure at least one non-bad
    if (!picked.some(p => p.type === '*' || p.type === '+')) {
      picked[0] = { type:'+', val:20, label:'+20', color: COL.good };
    }
    return picked;
  }

  function buildStage(n) {
    gates = [];
    let gid = 0;
    for (let r = 0; r < GATE_ROWS_Y.length; r++) {
      const effects = pickEffects(n, LANES);
      for (let c = 0; c < LANES; c++) {
        const x = 3 + c * LANE_W;
        const w = LANE_W - 2;
        gates.push({ id: gid++, x, y: GATE_ROWS_Y[r], w, h: 38, effect: effects[c], deactivated: false });
      }
    }
    enemy.maxHp = 250 + (n - 1) * 200;
    enemy.hp = enemy.maxHp;
    enemy.redSpawnMs = Math.max(80, 220 - (n - 1) * 18);
    enemy.redLastSpawn = 0;
    blues = [];
    reds = [];
    particles = [];
    stageStartMs = performance.now();
    lastBlueSpawn = 0;
    updateUI();
  }

  function updateUI() {
    stageEl.textContent = stage;
    armyEl.textContent = blues.length;
    hpEl.textContent = enemy.hp;
    const elapsed = state === 'playing' ? (performance.now() - stageStartMs) / 1000 : 0;
    timeEl.textContent = Math.max(0, Math.ceil(TIME_LIMIT - elapsed));
  }

  // ===== Game flow =====
  function start() {
    overlay.classList.remove('show');
    state = 'playing';
    statusEl.textContent = '게이트로 군대를 키우세요!';
    statusEl.className = 'status go';
    stageStartMs = performance.now();
    lastTs = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }
  function pause() {
    if (state !== 'playing') return;
    state = 'paused';
    pauseBtn.textContent = '재개';
    statusEl.textContent = '일시정지';
    statusEl.className = 'status';
    showOverlay('Paused', '일시정지', `스테이지 <strong>${stage}</strong> · 군대 <strong>${blues.length}</strong>`, '재개', resume, '');
  }
  function resume() {
    if (state !== 'paused') return;
    state = 'playing';
    pauseBtn.textContent = '일시정지';
    statusEl.textContent = '진행 중';
    statusEl.className = 'status go';
    overlay.classList.remove('show');
    const now = performance.now();
    const pausedFor = now - lastTs;
    stageStartMs += pausedFor;
    lastTs = now;
  }
  function togglePause() { if (state === 'playing') pause(); else if (state === 'paused') resume(); }

  function win() {
    state = 'cleared';
    if (stage > best) { best = stage; saveBest(best); }
    statusEl.textContent = `스테이지 ${stage} 클리어!`;
    statusEl.className = 'status win';
    setTimeout(() => showOverlay('Victory', `스테이지 ${stage} 클리어`, `남은 군대 <strong>${blues.length}</strong> · 남은 시간 <strong>${Math.max(0, Math.ceil(TIME_LIMIT - (performance.now() - stageStartMs) / 1000))}초</strong>`, '다음 스테이지', nextStage, 'win'), 350);
  }
  function nextStage() { stage++; buildStage(stage); start(); }
  function lose() {
    state = 'over';
    statusEl.textContent = '시간 초과 · 패배';
    statusEl.className = 'status lose';
    if (navigator.vibrate) navigator.vibrate(80);
    setTimeout(() => showOverlay('Defeat', `스테이지 ${stage} 실패`, `최고 스테이지 <strong>${best}</strong>`, '처음부터', restartFromOne, 'lose'), 250);
  }
  function restartFromOne() { stage = 1; buildStage(1); start(); }

  function showOverlay(eyebrow, title, body, btnText, btnFn, cls) {
    overlay.className = 'overlay show' + (cls ? ' ' + cls : '');
    ovEyebrow.textContent = eyebrow;
    ovTitle.textContent = title;
    ovStat.innerHTML = body;
    ovBtn.textContent = btnText;
    ovBtn.onclick = btnFn;
  }

  // ===== Loop =====
  function loop(ts) {
    const dt = Math.min(50, ts - lastTs);
    lastTs = ts;
    if (state === 'playing') update(ts, dt);
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function update(ts, dt) {
    const fs = dt / 16.67;

    // Spawn blues
    if (ts - lastBlueSpawn >= BLUE_SPAWN_MS && blues.length < MAX_STICK) {
      blues.push({ x: player.x + (Math.random() * 14 - 7), y: SPAWNER_Y - 8, alive: true });
      lastBlueSpawn = ts;
    }

    // Spawn reds (enemy)
    if (enemy.hp > 0 && ts - enemy.redLastSpawn >= enemy.redSpawnMs && reds.length < MAX_STICK) {
      reds.push({ x: 60 + Math.random() * (W - 120), y: ENEMY_Y + ENEMY_H + 4, alive: true });
      enemy.redLastSpawn = ts;
    }

    // Move blues
    for (const b of blues) {
      if (!b.alive) continue;
      const py = b.y;
      b.y -= BLUE_SPEED * fs;
      // gate triggers on crossing bottom edge from below (moving up)
      for (const g of gates) {
        if (g.deactivated) continue;
        if (b.x < g.x || b.x > g.x + g.w) continue;
        const gateBottom = g.y + g.h;
        if (py > gateBottom && b.y <= gateBottom) {
          applyGate(g, b);
          if (!b.alive) break;
        }
      }
      // hit enemy base
      if (b.alive && b.y <= ENEMY_Y + ENEMY_H && b.x >= 30 && b.x <= W - 30 && enemy.hp > 0) {
        enemy.hp = Math.max(0, enemy.hp - 1);
        b.alive = false;
        spawnParticle(b.x, ENEMY_Y + ENEMY_H, COL.red);
      }
      // off screen top
      if (b.y < -10) b.alive = false;
    }

    // Move reds
    for (const r of reds) {
      if (!r.alive) continue;
      r.y += RED_SPEED * fs;
      if (r.y > H + 10) r.alive = false;
    }

    // Clash blues vs reds (1:1)
    for (let i = 0; i < blues.length; i++) {
      const b = blues[i]; if (!b.alive) continue;
      for (let j = 0; j < reds.length; j++) {
        const r = reds[j]; if (!r.alive) continue;
        const dx = b.x - r.x;
        if (dx > CLASH_DIST || dx < -CLASH_DIST) continue;
        const dy = b.y - r.y;
        if (dy > CLASH_DIST || dy < -CLASH_DIST) continue;
        b.alive = false; r.alive = false;
        spawnParticle((b.x + r.x) / 2, (b.y + r.y) / 2, COL.mult);
        break;
      }
    }

    // Cleanup
    blues = blues.filter(b => b.alive);
    reds = reds.filter(r => r.alive);

    // Particles
    for (const p of particles) { p.life -= fs; p.r += 0.4 * fs; }
    particles = particles.filter(p => p.life > 0);

    updateUI();

    // Win / lose
    if (enemy.hp <= 0) return win();
    const elapsed = (ts - stageStartMs) / 1000;
    if (elapsed >= TIME_LIMIT) return lose();
  }

  // ===== Gate effects (PER STICKMAN) =====
  function applyGate(g, b) {
    const e = g.effect;
    if (e.type === '*') {
      // Each passing stickman spawns (val - 1) clones
      const add = e.val - 1;
      for (let i = 0; i < add && blues.length < MAX_STICK; i++) {
        blues.push({ x: g.x + Math.random() * g.w, y: g.y + g.h - 2, alive: true });
      }
      // multiplier gates STAY ACTIVE
    } else if (e.type === '+') {
      const add = e.val;
      for (let i = 0; i < add && blues.length < MAX_STICK; i++) {
        blues.push({ x: g.x + Math.random() * g.w, y: g.y + g.h - 2, alive: true });
      }
      g.deactivated = true;  // additive: one-time bonus
    } else if (e.type === '-') {
      // kill val blues currently in the lane (around this gate)
      let killed = 0;
      for (const x of blues) {
        if (!x.alive) continue;
        if (x.x < g.x - 5 || x.x > g.x + g.w + 5) continue;
        if (Math.abs(x.y - g.y) > 80) continue;
        x.alive = false; killed++;
        if (killed >= e.val) break;
      }
      g.deactivated = true;
    } else if (e.type === '/') {
      // halve current blues in lane
      let count = 0;
      const cand = [];
      for (const x of blues) {
        if (!x.alive) continue;
        if (x.x < g.x - 5 || x.x > g.x + g.w + 5) continue;
        cand.push(x);
      }
      const remove = Math.floor(cand.length / 2);
      for (let i = 0; i < remove; i++) cand[i].alive = false;
      g.deactivated = true;
    }
  }

  function spawnParticle(x, y, color) {
    if (particles.length > 40) return;
    particles.push({ x, y, r: 2, life: 8, color });
  }

  // ===== Draw =====
  function draw() {
    // Background
    ctx.fillStyle = COL.field;
    ctx.fillRect(0, 0, W, H);
    // mid lane guides
    ctx.fillStyle = COL.line;
    for (let i = 1; i < LANES; i++) {
      ctx.fillRect(i * LANE_W, 0, 1, H);
    }

    // Enemy base
    drawEnemyBase();

    // Gates
    for (const g of gates) {
      const used = g.deactivated;
      ctx.fillStyle = used ? '#A89878' : g.effect.color;
      ctx.globalAlpha = used ? 0.3 : 1;
      ctx.fillRect(g.x, g.y, g.w, g.h);
      // top/bottom thick edge
      ctx.fillStyle = used ? '#7A6B4F' : darken(g.effect.color);
      ctx.fillRect(g.x, g.y, g.w, 3);
      ctx.fillRect(g.x, g.y + g.h - 3, g.w, 3);
      ctx.globalAlpha = 1;
      // label
      ctx.fillStyle = used ? '#3D332A' : COL.text;
      ctx.font = 'bold 18px "EB Garamond", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(g.effect.label, g.x + g.w / 2, g.y + g.h / 2);
    }

    // Stickmen
    for (const b of blues) if (b.alive) drawStick(b.x, b.y, COL.blue);
    for (const r of reds) if (r.alive) drawStick(r.x, r.y, COL.red);

    // Particles
    for (const p of particles) {
      ctx.globalAlpha = Math.min(1, p.life / 8);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Spawner (player cannon)
    const sx = player.x;
    ctx.fillStyle = COL.spawnerEdge;
    ctx.fillRect(sx - 26, SPAWNER_Y - 4, 52, 28);
    ctx.fillStyle = COL.spawner;
    ctx.fillRect(sx - 22, SPAWNER_Y - 8, 44, 22);
    // barrel
    ctx.fillStyle = COL.spawnerEdge;
    ctx.fillRect(sx - 5, SPAWNER_Y - 18, 10, 14);
  }

  function drawEnemyBase() {
    // Castle-like rectangle at top
    ctx.fillStyle = COL.enemyEdge;
    ctx.fillRect(20, ENEMY_Y, W - 40, ENEMY_H);
    ctx.fillStyle = COL.enemy;
    ctx.fillRect(24, ENEMY_Y + 4, W - 48, ENEMY_H - 8);
    // Battlements
    for (let i = 0; i < 5; i++) {
      const bx = 30 + i * (W - 60) / 5;
      ctx.fillStyle = COL.enemyEdge;
      ctx.fillRect(bx, ENEMY_Y - 6, 14, 8);
    }
    // HP bar
    const hpW = W - 60;
    ctx.fillStyle = '#3A0A05';
    ctx.fillRect(30, ENEMY_Y + ENEMY_H + 6, hpW, 6);
    const ratio = enemy.maxHp > 0 ? enemy.hp / enemy.maxHp : 0;
    ctx.fillStyle = COL.red;
    ctx.fillRect(30, ENEMY_Y + ENEMY_H + 6, hpW * ratio, 6);
    // HP text
    ctx.fillStyle = COL.text;
    ctx.font = 'bold 18px "EB Garamond", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(enemy.hp + ' / ' + enemy.maxHp, W / 2, ENEMY_Y + ENEMY_H / 2);
  }

  function drawStick(x, y, color) {
    ctx.fillStyle = color;
    // head
    ctx.beginPath();
    ctx.arc(x, y - 3, STICK_R, 0, Math.PI * 2);
    ctx.fill();
    // body
    ctx.fillRect(x - 1.2, y, 2.4, 5);
  }

  function darken(hex) {
    // tiny helper: return slightly darker shade for edges
    const map = { [COL.good]: '#1F5635', [COL.bad]: '#8A2A1F', [COL.mult]: '#8A6A38' };
    return map[hex] || '#000';
  }

  // ===== Input =====
  let dragging = false;
  function ptX(e) {
    const t = e.touches ? e.touches[0] : e;
    const rect = boardWrap.getBoundingClientRect();
    return ((t.clientX - rect.left) / rect.width) * W;
  }
  function clampX(x) { return Math.max(28, Math.min(W - 28, x)); }
  function dragStart(e) { if (state !== 'playing') return; dragging = true; player.x = clampX(ptX(e)); if (e.cancelable) e.preventDefault(); }
  function dragMove(e) { if (!dragging || state !== 'playing') return; player.x = clampX(ptX(e)); if (e.cancelable) e.preventDefault(); }
  function dragEnd() { dragging = false; }

  boardWrap.addEventListener('touchstart', dragStart, { passive: false });
  boardWrap.addEventListener('touchmove', dragMove, { passive: false });
  boardWrap.addEventListener('touchend', dragEnd);
  boardWrap.addEventListener('touchcancel', dragEnd);
  boardWrap.addEventListener('mousedown', dragStart);
  window.addEventListener('mousemove', dragMove);
  window.addEventListener('mouseup', dragEnd);

  let keyLeft = false, keyRight = false;
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { keyLeft = true; e.preventDefault(); }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { keyRight = true; e.preventDefault(); }
    if (e.key === 'p' || e.key === 'P') { togglePause(); e.preventDefault(); }
    if ((e.key === ' ' || e.key === 'Enter') && state === 'ready') { e.preventDefault(); start(); }
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keyLeft = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keyRight = false;
  });
  setInterval(() => {
    if (state !== 'playing') return;
    if (keyLeft) player.x = clampX(player.x - 5);
    if (keyRight) player.x = clampX(player.x + 5);
  }, 16);

  // ===== Buttons =====
  ovBtn.onclick = () => { buildStage(stage); start(); };
  newGameBtn.addEventListener('click', () => { stage = 1; buildStage(1); start(); });
  pauseBtn.addEventListener('click', () => { if (state === 'ready') start(); else togglePause(); });

  // ===== Boot =====
  buildStage(1);
  draw();
  resizeCanvas();
  setTimeout(resizeCanvas, 100);
</script>
</body>
</html>
